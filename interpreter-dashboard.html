<!DOCTYPE html>
<html itemscope itemtype="http://schema.org/Product" prefix="og: http://ogp.me/ns#">
<head>
    <meta charset="utf-8">
    <meta http-equiv="content-type" content="text/html;charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="theme-color" content="#0D1A38">
    
    <title>VRS Interpreter Dashboard - Malka Communications</title>
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
    <link rel="stylesheet" href="css/all.css">
    <link rel="manifest" href="manifest.json">
    
    <script src="config.js"></script>
    <script src="interface_config.js"></script>
    <script src="libs/lib-jitsi-meet.min.js"></script>
    <script src="libs/app.bundle.min.js"></script>
    
    <script>
        // Custom page initialization for interpreter dashboard
        document.addEventListener('DOMContentLoaded', () => {
            let token = null;
            let role = null;

            try {
                token = localStorage.getItem('vrs_auth_token') || sessionStorage.getItem('vrs_auth_token');
                role = localStorage.getItem('vrs_user_role') || sessionStorage.getItem('vrs_user_role');
                if (token) {
                    sessionStorage.setItem('vrs_auth_token', token);
                }
                if (role) {
                    sessionStorage.setItem('vrs_user_role', role);
                }
            } catch (e) {}

            const isAuthenticated = Boolean(token) && role === 'interpreter';
            
            if (!isAuthenticated) {
                // Redirect to login if not authenticated
                window.location.href = '/interpreter-login';
                return;
            }

            // Initialize the interpreter dashboard
            if (JitsiMeetJS.app) {
                JitsiMeetJS.app.renderEntryPoint({
                    Component: JitsiMeetJS.app.entryPoints.InterpreterDashboard
                });
            }
        });
    </script>
    
    <style>
        /* Page-specific styles */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        
        /* Loading indicator */
        .loading-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 9999;
        }
        
        .loading-indicator .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #563d7c;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Loading indicator -->
    <div class="loading-indicator" id="loading">
        <div class="spinner"></div>
        <p>Loading Interpreter Dashboard...</p>
    </div>
    
    <!-- Main app container -->
    <div id="react" role="main"></div>
    
    <script>
        // Hide loading indicator once app is ready
        setTimeout(() => {
            const loading = document.getElementById('loading');
            if (loading) {
                loading.style.display = 'none';
            }
        }, 2000);
    </script>
</body>
</html>
