                    </div>
                </div>
                <div class="tab-grid">
                    <div>
                        <div class="card-title">Week</div>
                        ${scheduleHTML}
                        <div class="schedule-form">
                            <div class="card-title">Add Availability</div>
                            <div class="schedule-form-grid">
                                <div class="schedule-field">
                                    <label for="shift-date">Date</label>
                                    <input class="schedule-input" id="shift-date" type="date" value="${todayStr}">
                                </div>
                                <div class="schedule-field">
                                    <label for="shift-status">Status</label>
                                    <select class="schedule-input" id="shift-status">
                                        <option value="scheduled">Available</option>
                                        <option value="unavailable">Unavailable</option>
                                        <option value="time-off">Time off</option>
                                    </select>
                                </div>
                                <div class="schedule-field">
                                    <label for="shift-start">Start</label>
                                    <input class="schedule-input" id="shift-start" type="time" value="09:00">
                                </div>
                                <div class="schedule-field">
                                    <label for="shift-end">End</label>
                                    <input class="schedule-input" id="shift-end" type="time" value="17:00">
                                </div>
                            </div>
                            <button class="settings-btn" data-action="save-shift">Save Availability</button>
                            ${state.scheduleStatus ? `<div class="settings-status ${state.scheduleStatus.type}">${escapeHtml(state.scheduleStatus.message)}</div>` : ''}
                        </div>
                    </div>
                    <div>
                        <div class="card-title">Recent Shifts</div>
                        ${recentShifts.length > 0 ? shiftsHTML : '<div class="empty-state">No shifts scheduled</div>'}
                    </div>
                </div>
            `;

            const billingPanel = `
                <div class="tab-grid">
                    <div>
                        <div class="card-title">Billing</div>
                        <div class="earnings-total">${formatCurrency(stats.totalEarnings)}</div>
                        <div class="earnings-period">Net earnings this month</div>
                    </div>
                    <div>
                        <div class="card-title">Earnings Records</div>
                        ${earnings.length > 0 ? earningsHTML : '<div class="empty-state">No earnings records yet</div>'}
                    </div>
                </div>
            `;

            const historyPanel = `
                <div class="card-title">Call History</div>
                ${renderCallHistory(calls)}
            `;

            const settingsPanel = `
                <div class="settings-columns">
                    <div class="settings-group">
                        <div class="settings-group-title">Profile</div>
                        <div class="settings-row">
                            <label class="settings-label" for="interpreter-name">Display Name</label>
                            <input id="interpreter-name" class="settings-input" type="text" value="${escapeHtml(profile.name || '')}">
                        </div>
                        <div class="settings-row">
                            <label class="settings-label" for="interpreter-email">Email</label>
                            <input id="interpreter-email" class="settings-input" type="email" value="${escapeHtml(profile.email || '')}">
                        </div>
                        <div class="settings-row">
                            <label class="settings-label" for="interpreter-languages">Languages</label>
                            <input id="interpreter-languages" class="settings-input" type="text" value="${escapeHtml((languages || []).join(', '))}">
                        </div>
                        <div class="settings-actions">
                            <button class="settings-btn" data-action="save-profile">Save Profile</button>
                        </div>
                        ${state.settingsStatus ? `<div class="settings-status ${state.settingsStatus.type}">${escapeHtml(state.settingsStatus.message)}</div>` : ''}
                    </div>

                    <div class="settings-group">
                        <div class="settings-group-title">Call Defaults</div>
                        <div class="settings-row">
                            <label class="settings-label" for="interpreter-theme">Theme</label>
                            <select id="interpreter-theme" class="settings-select" data-change-action="preview-theme">
                                <option value="system" ${selectedTheme === 'system' ? 'selected' : ''}>System</option>
                                <option value="dark" ${selectedTheme === 'dark' ? 'selected' : ''}>Dark</option>
                                <option value="light" ${selectedTheme === 'light' ? 'selected' : ''}>Light</option>
                            </select>
                        </div>
                        <label class="settings-toggle">
                            <input id="interpreter-camera-off" type="checkbox" ${checked(preferences.cameraDefaultOff)}>
                            Camera off by default
                        </label>
                        <label class="settings-toggle">
                            <input id="interpreter-mic-off" type="checkbox" checked disabled>
                            Microphone always muted by default
                        </label>
                        <label class="settings-toggle">
                            <input id="interpreter-remember-media" type="checkbox" ${checked(preferences.rememberMediaPermissions)}>
                            Remember media permission
                        </label>
                        <div class="settings-actions">
                            <button class="settings-btn" data-action="save-profile">Save Defaults</button>
                        </div>
                    </div>
                </div>

                <div style="height:18px"></div>

                <div class="settings-grid">
                    <div class="settings-group-title">Password</div>
                    <div class="settings-row">
                        <label class="settings-label" for="interpreter-current-password">Current Password</label>
                        <input id="interpreter-current-password" class="settings-input" type="password" autocomplete="current-password">
                    </div>
                    <div class="settings-row">
                        <label class="settings-label" for="interpreter-new-password">New Password</label>
                        <input id="interpreter-new-password" class="settings-input" type="password" autocomplete="new-password">
                    </div>
                    <div class="settings-actions">
                        <button class="settings-btn secondary" data-action="change-password">Update Password</button>
                    </div>
                    ${state.passwordStatus ? `<div class="settings-status ${state.passwordStatus.type}">${escapeHtml(state.passwordStatus.message)}</div>` : ''}
                </div>
            `;

            const panelByTab = {
                assignments: assignmentsPanel,
                analytics: analyticsPanel,
                schedule: schedulePanel,
                billing: billingPanel,
                history: historyPanel,
                settings: settingsPanel
            };

            document.getElementById('app').innerHTML = `
                <div class="profile-header">
                    <div class="profile-header-left">
                        <img src="${brandLogo(true)}" alt="${brandName()}" class="profile-header-logo">
                        <span class="profile-header-title">Interpreter Profile</span>
                    </div>
                    <div class="profile-header-right">
                        <span class="profile-user-name">${user.name || user.email || ''}</span>
                        <button class="sign-out-btn" data-action="sign-out">Sign Out</button>
                    </div>
                </div>

                <div class="profile-main">
                    <div class="profile-hero">
                        <div class="card self-preview-card">
                            <div class="card-title">Self View</div>
                            <div class="self-preview-frame">
                                ${state.mediaPreview.status === 'active' ? '<video id="self-preview-video" autoplay muted playsinline></video>' : `
                                    <div class="self-preview-placeholder">
                                        ${state.mediaPreview.status === 'requesting' ? 'Waiting for camera permission...' : 'Turn on preview to check your camera before going available.'}
                                    </div>
                                `}
                                ${renderSelfDevicePanel()}
                            </div>
                            <div class="self-preview-status">${escapeHtml(state.mediaPreview.message || 'Preview uses camera only. Microphone is always muted by default.')}</div>
                            <div class="self-preview-actions">
                                ${state.mediaPreview.status === 'active' ? `
                                    <button class="settings-btn secondary" data-action="stop-self-preview">Turn Preview Off</button>
                                ` : `
                                    <button class="settings-btn" data-action="start-self-preview">Turn Preview On</button>
                                `}
                            </div>
                        </div>

                        <div class="profile-stack">
                            <div class="card">
                                <div class="profile-summary-top">
                                    <div>
                                        <div class="profile-name">${escapeHtml(profile.name || user.name || 'Interpreter')}</div>
                                        <div class="profile-subtitle">${serviceLabel} interpreter profile - ${state.wsConnected ? 'Connected' : 'Reconnecting'}</div>
                                    </div>
                                    <div class="service-chip-row">${renderServiceChips(modes, languages)}</div>
                                </div>
                                <div class="readiness-grid">
                                    <div class="readiness-item">
                                        <div class="readiness-value">${readinessStatus}</div>
                                        <div class="readiness-label">Queue</div>
                                    </div>
                                    <div class="readiness-item">
                                        <div class="readiness-value">${totalHours}</div>
                                        <div class="readiness-label">Hours</div>
                                    </div>
                                    <div class="readiness-item">
                                        <div class="readiness-value">${stats.totalCalls}</div>
                                        <div class="readiness-label">Completed</div>
                                    </div>
                                    <div class="readiness-item">
                                        <div class="readiness-value">${formatCurrency(stats.totalEarnings)}</div>
                                        <div class="readiness-label">Billing</div>
                                    </div>
                                </div>
                                ${state.available
                                    ? `<button class="join-queue-btn unavailable" data-action="leave-queue">Go Unavailable</button>`
                                    : `<button class="join-queue-btn" data-action="join-queue">Join Queue - Go Available</button>`}
                                <div class="readiness-note">
                                    Camera default is ${preferences.cameraDefaultOff ? 'off' : 'on'}.
                                    Microphone always starts muted.
                                    Billing, schedule, and call history live in the tabs below.
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="profile-tabs">${renderTabs()}</div>
                    <div class="card tab-panel">
                        ${panelByTab[state.activeTab] || assignmentsPanel}
                    </div>
                </div>
            `;
            syncSelfPreview();
        }

        // Actions
        window.__signOut = function() {
            clearPersistentAuth();
            window.location.href = '/';
        };

        async function submitJson(path, method, body) {
            const response = await fetch(API_BASE + path, {
                method,
                headers: authHeaders(),
                body: JSON.stringify(body)
            });
            const data = await response.json().catch(() => ({}));
            if (!response.ok) {
                throw new Error(data.error || 'Request failed');
            }
            return data;
        }

        window.__previewInterpreterTheme = function(mode) {
            applyTheme(mode);
        };

        window.__setInterpreterTab = function(tab) {
            const allowed = ['assignments', 'analytics', 'schedule', 'billing', 'history', 'settings'];
            state.activeTab = allowed.includes(tab) ? tab : 'assignments';
            setPersistentItem('vrs_interpreter_active_tab', state.activeTab);
            render();
        };

        window.__saveInterpreterProfile = async function() {
            state.settingsStatus = null;
            try {
                const languages = (document.getElementById('interpreter-languages')?.value || '')
                    .split(',')
                    .map(value => value.trim())
                    .filter(Boolean);
                const profile = await submitJson('/api/interpreter/profile', 'PUT', {
                    name: document.getElementById('interpreter-name')?.value || '',
                    email: document.getElementById('interpreter-email')?.value || '',
                    languages: languages.length ? languages : ['ASL']
                });
                state.profile = profile;
                const user = getUser() || {};
                setPersistentItem('vrs_user_info', JSON.stringify({
                    ...user,
                    name: profile.name,
                    email: profile.email
                }));
                applyTheme(document.getElementById('interpreter-theme')?.value || 'system');
                persistInterpreterPreferences({
                    cameraDefaultOff: !!document.getElementById('interpreter-camera-off')?.checked,
                    rememberMediaPermissions: !!document.getElementById('interpreter-remember-media')?.checked
                });
                state.settingsStatus = { type: 'success', message: 'Profile saved.' };
            } catch (error) {
                state.settingsStatus = { type: 'error', message: error.message };
            }
            render();
        };

        window.__changeInterpreterPassword = async function() {
            state.passwordStatus = null;
            try {
                await submitJson('/api/auth/password/change', 'POST', {
                    currentPassword: document.getElementById('interpreter-current-password')?.value || '',
                    newPassword: document.getElementById('interpreter-new-password')?.value || ''
                });
                state.passwordStatus = { type: 'success', message: 'Password updated.' };
            } catch (error) {
                state.passwordStatus = { type: 'error', message: error.message };
            }
            render();
        };

        /**
         * Mark this interpreter as available in the VRS queue.
         * The server will push interpreter_request messages when a client is waiting.
         */
        window.__joinQueue = function() {
            state.available = true;
            state.queueNotice = null;
            wsSend({ type: 'interpreter_status', data: { status: 'available' } });
            render();
        };

        /**
         * Mark this interpreter as unavailable and remove them from matching.
         */
        window.__leaveQueue = function() {
            state.available = false;
            state.queueNotice = null;
            wsSend({ type: 'interpreter_status', data: { status: 'inactive' } });
            render();
        };

        window.__saveInterpreterShift = async function() {
            state.scheduleStatus = null;
            try {
                const date = document.getElementById('shift-date')?.value || '';
                const startTime = document.getElementById('shift-start')?.value || '';
                const endTime = document.getElementById('shift-end')?.value || '';
                const status = document.getElementById('shift-status')?.value || 'scheduled';
                const totalMinutes = minutesBetweenTimes(startTime, endTime);
                await submitJson('/api/interpreter/shifts', 'POST', {
                    date,
                    startTime,
                    endTime,
                    status,
                    totalMinutes
                });
                await loadShifts();
                state.scheduleStatus = { type: 'success', message: 'Availability saved.' };
            } catch (error) {
                state.scheduleStatus = { type: 'error', message: error.message };
            }
            render();
        };

        window.__startInterpreterBreak = async function() {
            state.breakStatus = null;
            try {
                await submitJson('/api/interpreter/breaks/start', 'POST', { breakType: 'general', paid: false });
                await loadBreaks();
                await loadAnalytics();
                await loadUtilization();
                state.breakStatus = { type: 'success', message: 'Break started.' };
            } catch (error) {
                state.breakStatus = { type: 'error', message: error.message };
            }
            render();
        };

        window.__endInterpreterBreak = async function() {
            state.breakStatus = null;
            const activeBreak = (state.breaks || []).find(item => !item.ended_at);
            if (!activeBreak) {
                state.breakStatus = { type: 'error', message: 'No active break found.' };
                render();
                return;
            }
            try {
                await submitJson(`/api/interpreter/breaks/${encodeURIComponent(activeBreak.id)}/end`, 'POST', {});
                await loadBreaks();
                await loadAnalytics();
                await loadUtilization();
                state.breakStatus = { type: 'success', message: 'Break ended.' };
            } catch (error) {
                state.breakStatus = { type: 'error', message: error.message };
            }
            render();
        };

        /** Accept the pending client request and navigate to the assigned room. */
        window.__acceptRequest = function() {
            if (!state.pendingRequest || state.requestActionPending) return;
            const requestId = state.pendingRequest.requestId || state.pendingRequest.id;
            if (!requestId) return;
            state.requestActionPending = 'accept';
            renderAcceptOverlay();
            wsSend({
                type: 'accept_request',
                data: { requestId }
            });
            state.queueNotice = null;
            // Navigation happens in handleWsMessage on meeting_initiated.
        };

        /** Decline the pending client request and return to available state. */
        window.__declineRequest = function() {
            if (!state.pendingRequest || state.requestActionPending) return;
            const requestId = state.pendingRequest.requestId || state.pendingRequest.id;
            if (!requestId) return;
            state.requestActionPending = 'decline';
            renderAcceptOverlay();
            wsSend({
                type: 'decline_request',
                data: { requestId }
            });
            state.pendingRequest = null;
            state.requestActionPending = null;
            removeAcceptOverlay();
            clearDesktopIncomingCall();
        };

        // Data loading
        async function loadProfile() {
            const data = await apiFetch('/api/interpreter/profile');
            if (data) state.profile = data;
        }

        async function loadStats() {
            const data = await apiFetch('/api/interpreter/stats');
            if (data) state.stats = data;
        }

        async function loadAnalytics() {
            const data = await apiFetch('/api/interpreter/analytics');
            if (data) state.analytics = data.analytics || data;
        }

        async function loadUtilization() {
            const data = await apiFetch('/api/interpreter/utilization');
            if (data) state.utilization = data.utilization || data;
        }

        async function loadBreaks() {
            const data = await apiFetch('/api/interpreter/breaks?limit=10');
            if (data && data.breaks) state.breaks = data.breaks;
        }

        async function loadShifts() {
            const data = await apiFetch('/api/interpreter/shifts');
            if (data && data.shifts) state.shifts = data.shifts;
        }

        async function loadEarnings() {
            const data = await apiFetch('/api/interpreter/earnings');
            if (data && data.earnings) state.earnings = data.earnings;
        }

        async function loadCallHistory() {
            const data = await apiFetch('/api/interpreter/call-history?limit=10');
            if (data && data.calls) state.calls = data.calls;
        }

        // Init
        async function init() {
            applyTheme(getPersistentItem('vrs_interpreter_theme') || 'system');
            const user = getUser();
            const token = getToken();
            if (!user || !token || user.role !== 'interpreter') {
                document.getElementById('app').innerHTML = '<div class="auth-redirect"><p>Redirecting...</p></div>';
                setTimeout(() => { window.location.href = '/'; }, 500);
                return;
            }

            connectWS();
            await refreshMediaDevices();
            render();
            await Promise.all([loadProfile(), loadStats(), loadAnalytics(), loadUtilization(), loadBreaks(), loadShifts(), loadEarnings(), loadCallHistory()]);
            render();
            if (navigator.mediaDevices && navigator.mediaDevices.addEventListener) {
                navigator.mediaDevices.addEventListener('devicechange', async () => {
                    await refreshMediaDevices();
                    render();
                });
            }
        }

        init();
    })();
    </script>
</body>
</html>
