# Prometheus Configuration for MalkaVRS
#
# Scrapes metrics from:
#   - vrs-server   (port 3001)
#   - ops-server   (port 3003)
#   - twilio-server (port 3002, optional)
#   - JVB          (port 8080, Colibri stats)
#   - postgres-exporter
#   - redis-exporter
#   - node-exporter (host metrics)
#   - alertmanager

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    cluster: malka-vrs
    environment: '{{ .Environment | default "production" }}'

rule_files:
  - '/etc/prometheus/alert_rules/*.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # ─── MalkaVRS Server ────────────────────────────────────
  - job_name: 'vrs-server'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets:
          - 'vrs:3001'
        labels:
          service: 'vrs-server'
          component: 'api'

  # ─── Ops/Admin Server ──────────────────────────────────
  - job_name: 'ops-server'
    metrics_path: '/metrics'
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'ops:3003'
        labels:
          service: 'ops-server'
          component: 'admin'

  # ─── Twilio Voice Server ───────────────────────────────
  - job_name: 'twilio-server'
    metrics_path: '/metrics'
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'twilio:3002'
        labels:
          service: 'twilio-server'
          component: 'voice'

  # ─── Jitsi Videobridge ─────────────────────────────────
  - job_name: 'jvb'
    metrics_path: '/colibri/stats'
    scrape_interval: 10s
    static_configs:
      - targets:
          - 'jvb:8080'
        labels:
          service: 'jvb'
          component: 'media'

  # ─── PostgreSQL Exporter ────────────────────────────────
  - job_name: 'postgres'
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'postgres-exporter:9187'
        labels:
          service: 'postgresql'
          component: 'database'

  # ─── Redis Exporter ────────────────────────────────────
  - job_name: 'redis'
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'redis-exporter:9121'
        labels:
          service: 'redis'
          component: 'cache'

  # ─── Node Exporter (host metrics) ──────────────────────
  - job_name: 'node'
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'node-exporter:9100'
        labels:
          service: 'host'
          component: 'infra'

  # ─── Prometheus self-monitoring ────────────────────────
  - job_name: 'prometheus'
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'localhost:9090'
