resolver 127.0.0.11 valid=10s;

server {
    listen 80;
    server_name vrs.malkacomm.com app.malkacomm.com vri.maplecomm.ca;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# vri.maplecomm.ca is built by the vrs-maple Docker service with TENANT=maple.
# Its HTTPS server block below requires DNS to point at this droplet and
# /etc/letsencrypt/live/vri.maplecomm.ca to exist before nginx starts.

server {
    listen 80 default_server;
    server_name _;

    set $vrs_upstream http://vrs:3001;
    set $ops_upstream http://ops:3003;
    set $twilio_upstream http://twilio:3002;
    set $prosody_http_upstream http://prosody:5280;

    location /api/ {
        proxy_pass $vrs_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass $vrs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    location /ops/ {
        proxy_pass $ops_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /twilio/ {
        proxy_pass $twilio_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /http-bind {
        proxy_pass $prosody_http_upstream/http-bind;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    location /xmpp-websocket {
        proxy_pass $prosody_http_upstream/xmpp-websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass $vrs_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    client_max_body_size 10M;
}

server {
    listen 443 ssl http2;
    server_name vrs.malkacomm.com app.malkacomm.com;

    ssl_certificate /etc/letsencrypt/live/vrs.malkacomm.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vrs.malkacomm.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

