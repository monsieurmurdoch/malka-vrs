# Use Docker's internal DNS so nginx starts even if upstreams are temporarily down
resolver 127.0.0.11 valid=10s;

# --- HTTP only (temp testing before domain + SSL) ---
server {
    listen 80;
    server_name _;

    # ── VRS API + WebSocket ──
    location /api/ {
        set $vrs_upstream http://vrs:3001;
        proxy_pass $vrs_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket for queue + handoff
    location /ws {
        set $vrs_upstream http://vrs:3001;
        proxy_pass $vrs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # ── Ops Admin Dashboard ──
    location /ops/ {
        set $ops_upstream http://ops:3003;
        proxy_pass $ops_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Jitsi BOSH / XMPP-WebSocket ──
    location /http-bind {
        set $prosody_upstream http://prosody:5280;
        proxy_pass $prosody_upstream/http-bind;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    location /xmpp-websocket {
        set $prosody_upstream http://prosody:5280;
        proxy_pass $prosody_upstream/xmpp-websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # ── Static frontend (Jitsi + VRS UI) ──
    location / {
        set $vrs_upstream http://vrs:3001;
        proxy_pass $vrs_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Large file uploads
    client_max_body_size 10M;
}
