<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MalkaVRS - Client Profile</title>
    <link rel="stylesheet" href="css/all.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :focus-visible {
            outline: 3px solid #ffd166;
            outline-offset: 3px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a4d6e 0%, #2d5a3d 50%, #4a3b2a 100%);
            min-height: 100vh;
            color: #fff;
            overflow-y: auto;
        }

        /* Header */
        .profile-header {
            gap: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .profile-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .profile-header-logo {
            max-width: 120px;
            height: auto;
        }

        .profile-header-title {
            font-size: 20px;
            font-weight: 300;
            opacity: 0.8;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .profile-header-right {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: flex-end;
        }

        .profile-user-name {
            font-size: 14px;
            max-width: 220px;
            opacity: 0.7;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .sign-out-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            padding: 8px 20px;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .sign-out-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .sign-out-btn:focus-visible,
        .profile-nav-btn:focus-visible,
        .settings-btn:focus-visible,
        .quick-action-btn:focus-visible,
        .start-call-btn:focus-visible,
        .dialer-btn:focus-visible,
        .join-room-btn:focus-visible,
        .call-back-btn:focus-visible,
        .add-speed-dial-btn:focus-visible,
        .auth-tab:focus-visible,
        .auth-field:focus-visible,
        .auth-password-toggle:focus-visible,
        .vri-invite-input:focus-visible,
        .contact-search:focus-visible,
        summary:focus-visible,
        [role="button"]:focus-visible,
        .contact-card:focus-visible,
        .speed-dial-card:focus-visible {
            outline: 3px solid #ffd166;
            outline-offset: 3px;
        }

        .profile-nav-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            padding: 8px 14px;
            font-size: 14px;
            font-weight: 700;
        }

        .profile-nav-btn:hover {
            background: rgba(255,255,255,0.18);
        }

        .profile-nav-btn.active {
            background: rgba(255,255,255,0.24);
            border-color: rgba(255,255,255,0.42);
        }

        /* Main grid */
        .profile-main {
            max-width: 1180px;
            margin: 0 auto;
            padding: 24px;
            display: grid;
            gap: 18px;
        }

        .profile-hero {
            display: grid;
            gap: 18px;
            grid-template-columns: minmax(420px, 1.1fr) minmax(0, 0.9fr);
            align-items: stretch;
        }

        .profile-hero.vrs-home-hero {
            grid-template-columns: 1fr;
        }

        .vrs-home-lower {
            display: grid;
            gap: 18px;
            grid-template-columns: minmax(0, 1fr) minmax(340px, 420px);
            align-items: start;
        }

        .profile-stack {
            display: grid;
            gap: 18px;
        }

        .profile-summary {
            display: grid;
            gap: 14px;
        }

        .profile-summary-top {
            align-items: start;
            display: flex;
            justify-content: space-between;
            gap: 16px;
        }

        .quick-actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
        }

        .vrs-action-strip {
            display: grid;
            gap: 10px;
            grid-template-columns: minmax(180px, 1.1fr) minmax(140px, 0.7fr) minmax(260px, 1fr);
        }

        .vrs-action-strip .dialer-row {
            margin-bottom: 0;
        }

        .vrs-action-strip .start-call-btn,
        .vrs-action-strip .quick-action-btn,
        .vrs-action-strip .dialer-btn {
            min-height: 42px;
            padding: 9px 12px;
        }

        .settings-view {
            max-width: 980px;
        }

        .quick-action-btn {
            align-items: center;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            display: flex;
            font-size: 14px;
            font-weight: 700;
            justify-content: center;
            min-height: 44px;
            padding: 10px 12px;
            text-align: center;
        }

        .quick-action-btn:hover {
            background: rgba(255,255,255,0.14);
        }

        .profile-alert-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
        }

        .profile-sections {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 18px;
            align-items: start;
        }

        .profile-section-column {
            display: grid;
            gap: 18px;
        }

        .section-card {
            padding: 0;
            overflow: hidden;
        }

        .section-card > summary {
            align-items: center;
            cursor: pointer;
            display: flex;
            font-size: 16px;
            font-weight: 700;
            justify-content: space-between;
            list-style: none;
            padding: 18px 20px;
        }

        .section-card > summary::-webkit-details-marker {
            display: none;
        }

        .section-card > summary::after {
            content: '+';
            font-size: 20px;
            font-weight: 500;
            opacity: 0.55;
        }

        .section-card[open] > summary::after {
            content: '-';
        }

        .section-body {
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 20px;
        }

        .settings-columns {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 18px;
        }

        .settings-group {
            display: grid;
            gap: 12px;
        }

        .settings-group-title {
            font-size: 13px;
            font-weight: 800;
            opacity: 0.78;
            text-transform: uppercase;
        }

        /* Card base */
        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 20px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* VRS Number card */
        .vrs-number {
            font-size: 28px;
            font-weight: 700;
            color: #4caf50;
            margin: 8px 0 16px;
            letter-spacing: 1px;
        }

        .vrs-number-label {
            font-size: 12px;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .start-call-btn {
            width: 100%;
            padding: 14px;
            background: #4caf50;
            border: none;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .start-call-btn:hover {
            background: #43a047;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(76,175,80,0.35);
        }

        .self-preview-card {
            display: grid;
            gap: 12px;
            min-width: 0;
            overflow: hidden;
        }

        .self-preview-frame {
            align-items: center;
            aspect-ratio: 4 / 3;
            background: rgba(0,0,0,0.28);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            overflow: hidden;
            position: relative;
            min-height: clamp(280px, 34vw, 500px);
        }

        .self-preview-frame video {
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            width: 100%;
        }

        .self-device-panel {
            background: rgba(10,14,24,0.82);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 10px;
            bottom: 12px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.28);
            display: grid;
            gap: 8px;
            opacity: 0;
            padding: 10px;
            pointer-events: none;
            position: absolute;
            right: 12px;
            transform: translateY(6px);
            transition: opacity 0.18s ease, transform 0.18s ease;
            width: min(280px, calc(100% - 24px));
            z-index: 3;
        }

        .self-preview-frame:hover .self-device-panel,
        .self-preview-frame:focus-within .self-device-panel {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .self-device-row {
            display: grid;
            gap: 4px;
        }

        .self-device-label {
            color: rgba(255,255,255,0.74);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .self-device-select {
            background: rgba(255,255,255,0.92);
            border: 0;
            border-radius: 8px;
            color: #111827;
            font: inherit;
            font-size: 13px;
            min-width: 0;
            padding: 8px 9px;
            width: 100%;
        }

        .self-device-select option,
        .settings-select option {
            background: #fff;
            color: #111827;
        }

        .vrs-self-hero-card .self-preview-frame {
            min-height: clamp(420px, 66vh, 760px);
        }

        .self-preview-placeholder {
            color: rgba(255,255,255,0.72);
            font-size: 14px;
            line-height: 1.4;
            padding: 18px;
            text-align: center;
        }

        .self-preview-status {
            font-size: 12px;
            line-height: 1.4;
            opacity: 0.62;
        }

        .self-preview-actions {
            display: flex;
            gap: 8px;
        }

        .self-preview-actions .settings-btn {
            flex: 1;
        }

        .vri-console {
            display: grid;
            gap: 18px;
        }

        .vri-console-shell {
            display: grid;
            gap: 18px;
            grid-template-columns: minmax(0, 1fr);
        }

        .vri-self-card {
            min-height: 0;
        }

        .vri-self-card .self-preview-frame {
            min-height: clamp(420px, 66vh, 760px);
        }

        .vri-session-card {
            display: grid;
            gap: 16px;
        }

        .vri-action-row {
            align-items: center;
            display: grid;
            gap: 18px;
            grid-template-columns: minmax(240px, 0.42fr) minmax(0, 0.58fr);
        }

        .vri-session-eyebrow {
            color: rgba(255,255,255,0.62);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .vri-session-title {
            color: rgba(255,255,255,0.95);
            font-size: clamp(24px, 3vw, 40px);
            font-weight: 800;
            line-height: 1.08;
            margin: 0;
        }

        .vri-session-copy {
            color: rgba(255,255,255,0.7);
            font-size: 16px;
            line-height: 1.5;
            margin: 0;
        }

        .vri-request-btn {
            border-radius: 12px;
            font-size: clamp(20px, 2vw, 28px);
            min-height: 78px;
        }

        .vri-state-grid,
        .usage-summary-grid {
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .vri-state-item,
        .usage-summary-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 14px;
        }

        .vri-state-label,
        .usage-summary-label {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.06em;
            opacity: 0.58;
            text-transform: uppercase;
        }

        .vri-state-value,
        .usage-summary-value {
            font-size: 20px;
            font-weight: 800;
            margin-top: 5px;
        }

        .vri-invite-panel {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            display: grid;
            gap: 12px;
            padding: 14px;
        }

        .vri-invite-form {
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(3, minmax(0, 1fr)) auto;
        }

        .vri-invite-input {
            background: rgba(0,0,0,0.18);
            border: 1px solid rgba(255,255,255,0.16);
            border-radius: 8px;
            color: inherit;
            font-size: 14px;
            min-width: 0;
            padding: 12px;
        }

        .vri-invite-list {
            display: grid;
            gap: 8px;
        }

        .vri-invite-item {
            align-items: center;
            display: grid;
            gap: 10px;
            grid-template-columns: minmax(0, 1fr) auto;
        }

        .vri-invite-url {
            background: rgba(0,0,0,0.16);
            border-radius: 8px;
            font-size: 13px;
            overflow-wrap: anywhere;
            padding: 10px 12px;
            white-space: normal;
        }

        .vri-invite-status {
            font-size: 13px;
            opacity: 0.72;
        }

        .vri-inline-section {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .vri-inline-section > summary {
            cursor: pointer;
            font-size: 14px;
            font-weight: 800;
            list-style: none;
            padding: 14px;
        }

        .vri-inline-section > summary::-webkit-details-marker {
            display: none;
        }

        .vri-lower-grid {
            display: grid;
            gap: 18px;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        }

        body.theme-light .vri-session-eyebrow,
        body.theme-light .vri-session-title,
        body.theme-light .vri-session-copy {
            color: #16212a;
        }

        body.theme-light .vri-state-item,
        body.theme-light .usage-summary-card,
        body.theme-light .vri-inline-section {
            background: rgba(22,33,42,0.04);
            border-color: rgba(22,33,42,0.12);
            color: #16212a;
        }

        /* Phone dialer */
        .dialer-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .dialer-input {
            flex: 1;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: #fff;
            padding: 10px 12px;
            font-size: 15px;
            font-family: monospace;
        }

        .dialer-input::placeholder { color: rgba(255,255,255,0.3); }
        .dialer-input:focus { outline: none; border-color: #4caf50; }

        .dialer-btn {
            padding: 10px 20px;
            background: #2196f3;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .dialer-btn:hover { background: #1976d2; }
        .dialer-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Call history */
        .call-item {
            display: grid;
            gap: 12px;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .call-item:last-child {
            border-bottom: none;
        }

        .call-date {
            font-size: 14px;
            opacity: 0.6;
        }

        .call-duration {
            font-size: 14px;
            font-weight: 500;
            color: #4caf50;
        }

        .call-interpreter {
            font-size: 12px;
            opacity: 0.4;
            margin-top: 2px;
        }

        .call-actions {
            align-items: flex-end;
            display: grid;
            gap: 6px;
            justify-items: end;
        }

        .empty-state {
            text-align: center;
            padding: 32px 16px;
            opacity: 0.4;
            font-size: 14px;
        }

        /* Speed dial */
        .speed-dial-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .speed-dial-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .speed-dial-card:hover {
            background: rgba(255,255,255,0.12);
            border-color: #4caf50;
        }

        .speed-dial-name {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .speed-dial-number {
            font-size: 13px;
            opacity: 0.6;
            font-family: monospace;
        }

        .speed-dial-actions {
            position: absolute;
            top: 8px;
            right: 8px;
            display: flex;
            gap: 4px;
        }

        .speed-dial-actions button {
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 4px;
            color: #fff;
            cursor: pointer;
            font-size: 11px;
            padding: 3px 7px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .speed-dial-card:hover .speed-dial-actions button {
            opacity: 0.7;
        }

        .speed-dial-actions button:hover {
            opacity: 1 !important;
            background: rgba(255,255,255,0.2);
        }

        .add-speed-dial-btn {
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px dashed rgba(255,255,255,0.2);
            border-radius: 8px;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .add-speed-dial-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border-color: #4caf50;
        }

        .contacts-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
        }

        .contact-search {
            flex: 1 1 180px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            padding: 10px 12px;
        }

        .contact-card {
            align-items: center;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            gap: 12px;
            padding: 12px;
            transition: all 0.2s ease;
        }

        .contact-card + .contact-card {
            margin-top: 8px;
        }

        .contact-card:hover {
            background: rgba(255,255,255,0.12);
            border-color: #4caf50;
        }

        .contact-avatar {
            align-items: center;
            background: #4caf50;
            border-radius: 999px;
            color: #fff;
            display: flex;
            flex: 0 0 38px;
            font-size: 14px;
            font-weight: 800;
            height: 38px;
            justify-content: center;
            width: 38px;
        }

        .contact-main {
            min-width: 0;
        }

        .contact-name {
            font-size: 14px;
            font-weight: 700;
        }

        .contact-meta {
            font-size: 12px;
            margin-top: 2px;
            opacity: 0.56;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .contact-detail {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            margin-top: 14px;
            padding: 14px;
        }

        .contact-detail-header {
            align-items: flex-start;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .contact-detail-title {
            font-size: 18px;
            font-weight: 800;
        }

        .contact-detail-subtitle {
            font-size: 13px;
            margin-top: 4px;
            opacity: 0.62;
        }

        .timeline-item,
        .note-item {
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 10px 0;
        }

        .timeline-title,
        .note-content {
            font-size: 13px;
            line-height: 1.4;
        }

        .timeline-time,
        .note-time {
            font-size: 11px;
            margin-top: 3px;
            opacity: 0.45;
        }

        .contact-import-grid {
            display: grid;
            gap: 8px;
            margin-top: 12px;
        }

        /* Inline form */
        .inline-form {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .inline-form input {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            color: #fff;
            padding: 10px 12px;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .inline-form input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .inline-form input:focus {
            outline: none;
            border-color: #4caf50;
        }

        .inline-form-actions {
            display: flex;
            gap: 8px;
        }

        .inline-form-actions button {
            flex: 1;
            padding: 10px;

            padding: 40px;

        .auth-redirect {

            flex-direction: column;
            gap: 16px;
        }

        .active-room-item {

            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);

        .join-room-btn {

            border-radius: 6px;

            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;

        /* Missed calls card */
        .card-missed-calls {
            border-color: rgba(244,67,54,0.3);

        .missed-call-item {

            border-radius: 6px;

            font-size: 12px;
            transition: all 0.2s ease;

        /* Full-screen overlays */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            flex-direction: column;
            gap: 24px;
        }

        .overlay-caller-name {
            font-size: 32px;
            font-weight: 600;
        }

        .overlay-status {
            font-size: 18px;
            opacity: 0.7;
        }

        .overlay-buttons {
            display: flex;
            gap: 20px;
            margin-top: 12px;

        .overlay-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .overlay-btn:hover { transform: scale(1.1); }

        .overlay-btn-accept {
            background: #4caf50;
            color: #fff;
        }

        .overlay-btn-decline {
            background: #f44336;
            color: #fff;

        .overlay-btn-cancel {
            background: rgba(255,255,255,0.15);
            color: #fff;
            width: 60px;
            height: 60px;
            font-size: 22px;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .pulse-animation {
            position: relative;
        }

        .pulse-animation::before {
            content: '';
            position: absolute;
            top: -8px; left: -8px; right: -8px; bottom: -8px;
            border-radius: 50%;
            border: 3px solid #2196f3;
            animation: pulse-ring 1.5s ease-out infinite;
        }

            font-size: 11px;
            opacity: 0.4;
            padding: 4px 0;
            text-align: center;

        .ws-connected { color: #4caf50; }

        body.theme-maple:not(.theme-light) .settings-select,
        body.theme-maple:not(.theme-light) .settings-textarea,
        body.theme-maple:not(.theme-light) .inline-form input,

        body.theme-maple:not(.theme-light) .settings-input:focus,
        body.theme-maple:not(.theme-light) .settings-select:focus,
        body.theme-maple:not(.theme-light) .settings-textarea:focus,
        body.theme-maple:not(.theme-light) .inline-form input:focus,
        body.theme-maple:not(.theme-light) .dialer-input:focus,

        body.theme-maple:not(.theme-light) .contact-card:hover {

        body.theme-maple:not(.theme-light) .vri-session-eyebrow,
        body.theme-maple:not(.theme-light) .vri-session-title,
        body.theme-maple:not(.theme-light) .vri-session-copy,
        body.theme-maple:not(.theme-light) .usage-summary-label,

        body.theme-maple:not(.theme-light) .usage-summary-value,

        .settings-status {

        .settings-status.success {

        .contact-search:focus-visible {

        /* Responsive */
        @media (max-width: 1024px) {
            .profile-main {

        @media (max-width: 520px) {
            .profile-main {

            .card,
            .section-body,
            .auth-card {

            .self-preview-frame,

            .auth-page {

        }

</head>
<body>
    <div id="app"></div>

    <!-- Overlays rendered by JS outside #app to persist across re-renders -->
    <div id="overlays"></div>

    <!-- Hidden audio element for ringtone -->
    <audio id="ringtone" src="sounds/ring.mp3" loop preload="auto"></audio>

    <script src="whitelabel-runtime.js"></script>
    <script src="config.js"></script>
    <script>
    (function() {
        const IS_LOCAL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const BRAND = window.__WHITELABEL__ || {};
        const IS_MAPLE = BRAND.tenantId === 'maple' || window.location.hostname.includes('maplecomm.ca');
        const SERVICE_LABEL = IS_MAPLE ? 'VRI' : 'VRS';

        if (IS_MAPLE) {
            document.body.classList.add('theme-maple');
        }

        function brandName() {
            return IS_MAPLE ? 'MapleVRI' : (BRAND.appName || 'MalkaVRS');
        }

        function brandLogo(preferWhite) {
            if (IS_MAPLE) {
                return 'images/maple-logo-original.png';
            }

            return preferWhite ? 'images/malka-logo-white.png' : 'images/malka-logo.png';
        }

        document.title = `${brandName()} - Client Profile`;

        function isLoopbackUrl(value) {
            if (!value) {
                return false;
            }

            try {
                const parsed = new URL(value, window.location.origin);
                return parsed.hostname === 'localhost' || parsed.hostname === '127.0.0.1';
            } catch (error) {
                return false;
            }
        }

        function preferConfiguredUrl(configuredValue, fallbackValue) {
            if (!configuredValue) {
                return fallbackValue;
            }

            if (!IS_LOCAL && isLoopbackUrl(configuredValue)) {
                return fallbackValue;
            }

            return configuredValue;
        }

        const API_BASE = (function() {
            const configured = typeof config !== 'undefined' && config.vrs && config.vrs.queueServiceUrl
                ? config.vrs.queueServiceUrl.replace(/^ws/, 'http').replace(/\/ws$/, '')
                : null;
            return preferConfiguredUrl(configured, window.location.origin);
        })();

        const WS_URL = (function() {
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const fallback = `${wsProtocol}//${window.location.host}/ws`;
            const configured = typeof config !== 'undefined' && config.vrs && config.vrs.queueServiceUrl
                ? config.vrs.queueServiceUrl
                : null;
            return preferConfiguredUrl(configured, fallback);
        })();

        function getPersistentItem(key) {
            try {
                const localValue = localStorage.getItem(key);
                if (localValue !== null) {
                    sessionStorage.setItem(key, localValue);
                    return localValue;
                }
            } catch (e) {}

            try {
                const sessionValue = sessionStorage.getItem(key);
                if (sessionValue !== null) {
                    localStorage.setItem(key, sessionValue);
                    return sessionValue;
                }
            } catch (e) {}

            return null;
        }

        function setPersistentItem(key, value) {
            try { localStorage.setItem(key, value); } catch (e) {}
            try { sessionStorage.setItem(key, value); } catch (e) {}
        }

        function clearPersistentAuth() {
            [
                'vrs_auth_token',
                'vrs_user_info',
                'vrs_user_role',
                'vrs_client_auth',
                'vrs_interpreter_auth'
            ].forEach(function(key) {
                try { localStorage.removeItem(key); } catch (e) {}
                try { sessionStorage.removeItem(key); } catch (e) {}
            });
        }

        function getToken() {
            try {
                const stored = JSON.parse(getPersistentItem('vrs_auth_token') || '{}');
                return stored.token || null;
            } catch(e) { return null; }
        }

        function getUser() {
            try {
                return JSON.parse(getPersistentItem('vrs_user_info') || 'null');
            } catch(e) { return null; }
        }

        function getServiceModes() {
            const user = getUser();
            if (state.profile && Array.isArray(state.profile.serviceModes)) {
                return state.profile.serviceModes;
            }
            if (user && Array.isArray(user.serviceModes)) {
                return user.serviceModes;
            }
            return IS_MAPLE ? ['vri'] : ['vrs'];
        }

        function canUseVrsMode() {
            return getServiceModes().includes('vrs');
        }

        function canUseVriMode() {
            return getServiceModes().includes('vri');
        }

        function isVriOnlyAccount() {
            return canUseVriMode() && !canUseVrsMode();
        }

        function authHeaders() {
            const token = getToken();
            return token ? { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' } : { 'Content-Type': 'application/json' };
        }

        async function apiFetch(path, options = {}) {
            const res = await fetch(API_BASE + path, { ...options, headers: { ...authHeaders(), ...(options.headers || {}) } });
            if (res.status === 401) {
                clearPersistentAuth();
                window.location.href = '/';
                return null;
            }
            if (res.status === 403) {
                return null;
            }
            return res.json();
        }

        // State
        let state = {
            profile: null,
            preferences: null,
            calls: [],
            speedDial: [],
            contacts: [],
            contactDetail: null,
            contactSearch: '',
            contactStatus: null,
            contactSyncSince: getPersistentItem('vrs_contacts_sync_since') || '',
            missedCalls: [],
            activeRooms: [],
            settingsStatus: null,
            passwordStatus: null,
            profileView: 'home',
            mediaPreview: {
                enabled: getPersistentItem('vrs_self_preview_enabled') !== 'false',
                status: 'idle',
                message: ''
            },
            mediaDevices: {
                cameras: [],
                microphones: [],
                selectedCameraId: getPersistentItem('vrs_camera_device_id') || '',
                selectedMicId: getPersistentItem('vrs_microphone_device_id') || ''
            },
            showAddForm: false,
            editEntry: null,
            newName: '',
            newPhone: '',
            newCategory: 'personal',
            // P2P call state
            incomingCall: null,   // { callId, roomName, callerName, callerId, calleeId }
            ringingCall: null,    // { callId, roomName, calleeName, calleePhone }
            // VRS queue state
            queueRequest: null,   // { requestId, position, roomName, language, targetPhone }
            vriInvites: [],
            vriInviteForm: { guestName: '', guestEmail: '', guestPhone: '' },
            vriInviteStatus: '',
            wsConnected: false,
            // Auth state
            authScreen: 'login',  // 'login' | 'register' | 'forgot' | 'reset' | 'otp' | 'otp-verify'
            authTab: 'email',     // 'email' | 'phone' | 'sms'
            authError: '',
            authSuccess: '',
            authLoading: false,
            otpPhoneNumber: ''
        };

        // ============================================
        // WEBSOCKET CONNECTION
        // ============================================

        let ws = null;
        let wsReconnectTimer = null;
        let previewStream = null;
        let wsAuthenticated = false;
        const pendingWsMessages = [];

        function connectWebSocket() {
            const user = getUser();
            const token = getToken();
            if (!user || !token) return;

            ws = new WebSocket(WS_URL);

            ws.onopen = function() {
                console.log('[WS] Connected');
                state.wsConnected = true;
                wsAuthenticated = false;
                // Authenticate
                ws.send(JSON.stringify({
                    type: 'auth',
                    role: 'client',
                    userId: user.id,
                    name: user.name,
                    token: token
                }));
            };

            ws.onmessage = function(event) {
                try {
                    const msg = JSON.parse(event.data);
                    handleWebSocketMessage(msg);
                } catch(e) {
                    console.error('[WS] Parse error:', e);
                }
            };

            ws.onclose = function() {
                console.log('[WS] Disconnected, reconnecting in 3s...');
                state.wsConnected = false;
                wsAuthenticated = false;
                updateWsStatus();
                wsReconnectTimer = setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = function(err) {
                console.error('[WS] Error:', err);
            };
        }

        function updateWsStatus() {
            const el = document.getElementById('ws-status');
            if (el) {
                el.textContent = state.wsConnected ? 'Connected' : 'Reconnecting...';
                el.className = 'ws-status ' + (state.wsConnected ? 'ws-connected' : 'ws-disconnected');
            }
        }

        function resolveTheme(mode) {
            const selected = mode || getPersistentItem('vrs_dark_mode') || 'system';
            if (selected === 'dark' || selected === 'light') {
                return selected;
            }
            return window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }

        function applyTheme(mode) {
            const selected = mode || 'system';
            const resolved = resolveTheme(selected);
            document.body.classList.toggle('theme-light', resolved === 'light');
            setPersistentItem('vrs_dark_mode', selected);
        }

        function getPreferredLanguage() {
            const selected = getPersistentItem('vrs_preferred_language') || 'en';
            return ['en', 'ar'].includes(selected) ? selected : 'en';
        }

        function applyLanguage(lang) {
            const selected = ['en', 'ar'].includes(lang) ? lang : 'en';
            document.documentElement.lang = selected;
            document.documentElement.dir = selected === 'ar' ? 'rtl' : 'ltr';
            setPersistentItem('vrs_preferred_language', selected);
        }

        function wsSend(data) {
            if (ws && ws.readyState === WebSocket.OPEN && wsAuthenticated) {
                ws.send(JSON.stringify(data));
                return true;
            }

            pendingWsMessages.push(data);
            if (!ws || ws.readyState === WebSocket.CLOSED || ws.readyState === WebSocket.CLOSING) {
                connectWebSocket();
            }
            return false;
        }

        function getRoomPreferences() {
            const prefs = state.preferences || {};
            return {
                cameraDefaultOff: prefs.camera_default_off !== false,
                micDefaultOff: prefs.mic_default_off !== false,
                rememberMediaPermissions: prefs.remember_media_permissions !== false,
                skipWaitingRoom: !!prefs.skip_waiting_room
            };
        }

        function persistRoomPreferences() {
            const prefs = getRoomPreferences();
            if (prefs.rememberMediaPermissions) {
                setPersistentItem('vrs_media_preferences', JSON.stringify({
                    cameraDefaultOff: prefs.cameraDefaultOff,
                    micDefaultOff: prefs.micDefaultOff,
                    cameraDeviceId: getPersistentItem('vrs_camera_device_id') || '',
                    microphoneDeviceId: getPersistentItem('vrs_microphone_device_id') || '',
                    updatedAt: new Date().toISOString()
                }));
            }
        }

        async function refreshMediaDevices() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) {
                return;
            }

            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const cameras = devices.filter(device => device.kind === 'videoinput');
                const microphones = devices.filter(device => device.kind === 'audioinput');
                let selectedCameraId = getPersistentItem('vrs_camera_device_id') || '';
                let selectedMicId = getPersistentItem('vrs_microphone_device_id') || '';

                if (selectedCameraId && !cameras.some(device => device.deviceId === selectedCameraId)) {
                    selectedCameraId = '';
                    setPersistentItem('vrs_camera_device_id', '');
                }

                if (selectedMicId && !microphones.some(device => device.deviceId === selectedMicId)) {
                    selectedMicId = '';
                    setPersistentItem('vrs_microphone_device_id', '');
                }

                state.mediaDevices = { cameras, microphones, selectedCameraId, selectedMicId };
                if (selectedCameraId) {
                    persistJitsiDevicePreference('camera', selectedCameraId);
                }
                if (selectedMicId) {
                    persistJitsiDevicePreference('microphone', selectedMicId);
                }
            } catch (error) {
                console.warn('[Media] Could not enumerate devices:', error);
            }
        }

        function selectedVideoConstraint() {
            const selectedCameraId = state.mediaDevices.selectedCameraId || getPersistentItem('vrs_camera_device_id') || '';
            return selectedCameraId ? { deviceId: { exact: selectedCameraId } } : true;
        }

        function persistJitsiDevicePreference(kind, deviceId) {
            const devices = kind === 'camera' ? state.mediaDevices.cameras : state.mediaDevices.microphones;
            const selected = (devices || []).find(device => device.deviceId === deviceId);
            let settings = {};

            try {
                settings = JSON.parse(localStorage.getItem('features/base/settings') || '{}') || {};
            } catch (error) {
                settings = {};
            }

            if (kind === 'camera') {
                settings.cameraDeviceId = deviceId || undefined;
                settings.userSelectedCameraDeviceId = deviceId || undefined;
                settings.userSelectedCameraDeviceLabel = selected?.label || undefined;
            } else {
                settings.micDeviceId = deviceId || undefined;
                settings.userSelectedMicDeviceId = deviceId || undefined;
                settings.userSelectedMicDeviceLabel = selected?.label || undefined;
            }

            try {
                localStorage.setItem('features/base/settings', JSON.stringify(settings));
            } catch (error) {
                console.warn('[Media] Could not persist room device preference:', error);
            }
        }

        function updateMediaDevicePreference(kind, deviceId) {
            const key = kind === 'camera' ? 'vrs_camera_device_id' : 'vrs_microphone_device_id';
            setPersistentItem(key, deviceId || '');
            state.mediaDevices = {
                ...state.mediaDevices,
                selectedCameraId: kind === 'camera' ? (deviceId || '') : state.mediaDevices.selectedCameraId,
                selectedMicId: kind === 'microphone' ? (deviceId || '') : state.mediaDevices.selectedMicId
            };
            persistJitsiDevicePreference(kind, deviceId || '');
            persistRoomPreferences();
        }

        function persistSelectedJitsiDevicesForRoom() {
            const selectedCameraId = state.mediaDevices.selectedCameraId || getPersistentItem('vrs_camera_device_id') || '';
            const selectedMicId = state.mediaDevices.selectedMicId || getPersistentItem('vrs_microphone_device_id') || '';

            if (selectedCameraId) {
                persistJitsiDevicePreference('camera', selectedCameraId);
            }
            if (selectedMicId) {
                persistJitsiDevicePreference('microphone', selectedMicId);
            }
        }

        function canUseRealtimeMedia() {
            const isLocalhost = ['localhost', '127.0.0.1', '::1'].includes(window.location.hostname);
            return Boolean(
                window.isSecureContext
                || isLocalhost
                || window.location.protocol === 'https:'
            ) && Boolean(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
        }

        function attachSelfPreview() {
            const video = document.getElementById('self-preview-video');
            if (!video || !previewStream) return;
            if (video.srcObject !== previewStream) {
                video.srcObject = previewStream;
            }
            video.play().catch(() => {});
        }

        async function startSelfPreview(silent) {
            if (previewStream) {
                state.mediaPreview = { enabled: true, status: 'active', message: `Camera preview is on. ${canUseVriMode() ? 'Sessions' : 'Calls'} still start muted.` };
                setPersistentItem('vrs_self_preview_enabled', 'true');
                attachSelfPreview();
                if (!silent) render();
                return;
            }

            if (!canUseRealtimeMedia()) {
                state.mediaPreview = { enabled: false, status: 'error', message: 'Camera preview needs HTTPS and browser camera support.' };
                setPersistentItem('vrs_self_preview_enabled', 'false');
                render();
                return;
            }

            state.mediaPreview = { enabled: true, status: 'requesting', message: 'Waiting for camera permission...' };
            setPersistentItem('vrs_self_preview_enabled', 'true');
            if (!silent) render();

            try {
                await refreshMediaDevices();
                previewStream = await navigator.mediaDevices.getUserMedia({ video: selectedVideoConstraint(), audio: false });
                await refreshMediaDevices();
                state.mediaPreview = { enabled: true, status: 'active', message: `Camera preview is on. ${canUseVriMode() ? 'Sessions' : 'Calls'} still start muted.` };
            } catch (error) {
                if (state.mediaDevices.selectedCameraId) {
                    updateMediaDevicePreference('camera', '');
                }
                state.mediaPreview = { enabled: false, status: 'error', message: 'Camera permission was not granted.' };
                setPersistentItem('vrs_self_preview_enabled', 'false');
            }
            render();
        }

        function stopSelfPreview() {
            if (previewStream) {
                previewStream.getTracks().forEach(track => track.stop());
                previewStream = null;
            }
            state.mediaPreview = { enabled: false, status: 'idle', message: '' };
            setPersistentItem('vrs_self_preview_enabled', 'false');
            render();
        }

        async function selectCameraDevice(deviceId) {
            updateMediaDevicePreference('camera', deviceId);
            if (previewStream) {
                previewStream.getTracks().forEach(track => track.stop());
                previewStream = null;
                await startSelfPreview(false);
                return;
            }
            render();
        }

        function selectMicDevice(deviceId) {
            updateMediaDevicePreference('microphone', deviceId);
            render();
        }

        function togglePasswordVisibility(targetId, button) {
            const input = document.getElementById(targetId);
            if (!input) return;
            const shouldShow = input.type === 'password';
            input.type = shouldShow ? 'text' : 'password';
            if (button) {
                button.textContent = shouldShow ? 'Hide' : 'Show';
                button.setAttribute('aria-label', shouldShow ? 'Hide password' : 'Show password');
            }
            input.focus();
        }

        function syncSelfPreview() {
            attachSelfPreview();
            if (state.mediaPreview.enabled && !previewStream && state.mediaPreview.status !== 'requesting') {
                setTimeout(() => startSelfPreview(true), 0);
            }
        }

        function showSecureMediaWarning() {
            alert('Video rooms need a secure browser context with camera and microphone support. Open this app over HTTPS and allow camera/mic access, then try again.');
        }

        function removePersistentItem(key) {
            try { localStorage.removeItem(key); } catch (e) {}
            try { sessionStorage.removeItem(key); } catch (e) {}
        }

        function persistActiveCall(data, role) {
            if (!data || !data.callId) {
                return;
            }

            setPersistentItem('vrs_active_call', JSON.stringify({
                callId: data.callId,
                callType: data.callType || (data.targetPhone ? 'vrs' : 'vri'),
                roomName: data.roomName || '',
                role: role || 'client',
                startedAt: new Date().toISOString()
            }));
        }

        function buildRoomUrl(roomName, role, options) {
            const prefs = getRoomPreferences();
            const opts = options || {};
            const startWithAudioMuted = opts.forceMicMuted || prefs.micDefaultOff;
            const startWithVideoMuted = opts.forceCameraOff || prefs.cameraDefaultOff;
            const skipPrejoin = opts.skipPrejoin === true || prefs.skipWaitingRoom;
            const query = new URLSearchParams();
            if (opts.includeRole !== false) {
                query.set('role', role || 'client');
            }
            const config = new URLSearchParams({
                'config.startWithAudioMuted': String(startWithAudioMuted),
                'config.startWithVideoMuted': String(startWithVideoMuted),
                'config.prejoinConfig.enabled': String(!skipPrejoin)
            });

            const queryString = query.toString();
            return `/${encodeURIComponent(roomName)}${queryString ? `?${queryString}` : ''}#${config.toString()}`;
        }

        function navigateToRoom(roomName, role, options) {
            if (!roomName) {
                return;
            }
            const opts = options || {};

            if (!canUseRealtimeMedia()) {
                showSecureMediaWarning();
                return;
            }

            if (opts.setVrsRole === false) {
                removePersistentItem('vrs_user_role');
                removePersistentItem('vrs_target_client');
                removePersistentItem('vrs_client_auth');
            } else {
                setPersistentItem('vrs_user_role', role || 'client');
                setPersistentItem('vrs_client_auth', 'true');
            }
            persistSelectedJitsiDevicesForRoom();
            persistRoomPreferences();
            window.location.href = buildRoomUrl(roomName, role || 'client', opts);
        }

        // ============================================
        // WEBSOCKET MESSAGE HANDLER
        // ============================================

        function handleWebSocketMessage(msg) {
            console.log('[WS] Received:', msg.type, msg);

            switch (msg.type) {
                case 'auth_success':
                    console.log('[WS] Auth success');
                    state.wsConnected = true;
                    wsAuthenticated = true;
                    while (pendingWsMessages.length > 0 && ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify(pendingWsMessages.shift()));
                    }
                    updateWsStatus();
                    break;

                case 'auth_error':
                    console.error('[WS] Auth error:', msg.data);
                    break;

                case 'error':
                    if (state.queueRequest) {
                        state.queueRequest = null;
                        renderOverlays();
                    }
                    if (msg.data && msg.data.message) {
                        alert(msg.data.message);
                    }
                    break;

                case 'p2p_incoming_call':
                    handleIncomingCall(msg.data);
                    break;

                case 'p2p_ringing':
                    handleRinging(msg.data);
                    break;

                case 'p2p_accepted':
                    handleAccepted(msg.data);
                    break;

                case 'p2p_join_room':
                    handleJoinRoom(msg.data);
                    break;

                case 'p2p_declined':
                    handleDeclined(msg.data);
                    break;

                case 'p2p_target_offline':
                    handleTargetOffline(msg.data);
                    break;

                case 'p2p_call_failed':
                    handleCallFailed(msg.data);
                    break;

                case 'p2p_call_cancelled':
                    handleCallCancelled();
                    break;

                case 'p2p_call_ended':
                    handleCallEnded(msg.data);
                    break;

                case 'missed_calls':
                    if (msg.data && msg.data.length > 0) {
                        state.missedCalls = msg.data;
                        render();
                        showBrowserNotification('Missed Calls', 'You have ' + msg.data.length + ' missed call(s)');
                    }
                    break;

                case 'contacts_changed':
                    refreshContactsFromSync();
                    break;

                case 'vri_invite_prepared':
                    state.vriInvites = [...state.vriInvites.filter(invite => invite.token !== msg.data.token), msg.data];
                    state.vriInviteStatus = 'Invite link prepared. It opens after the interpreter confirms.';
                    render();
                    break;

                // ── VRS queue responses ──────────────────────────────────────
                case 'request_queued':
                    // Server confirmed we're in queue. Show waiting UI.
                    state.queueRequest = msg.data;
                    renderOverlays();
                    break;

                case 'match_found':
                case 'meeting_initiated':
                    // Interpreter accepted — navigate both parties to the shared room.
                    if (msg.data && msg.data.roomName) {
                        const callType = msg.data.callType || (msg.data.targetPhone ? 'vrs' : 'vri');
                        state.queueRequest = null;
                        persistActiveCall(msg.data, 'client');
                        setPersistentItem('vrs_user_role', 'client');
                        navigateToRoom(msg.data.roomName, 'client', {
                            forceCameraOff: callType === 'vri',
                            forceMicMuted: true,
                            skipPrejoin: true
                        });
                    }
                    break;

                case 'pong':
                case 'heartbeat_ack':
                    break;
            }
        }

        // ============================================
        // P2P CALL UI HANDLERS
        // ============================================

        function handleIncomingCall(data) {
            state.incomingCall = data;
            renderOverlays();
            playRingtone();
            showBrowserNotification('Incoming Call', data.callerName + ' is calling you');
        }

        function handleRinging(data) {
            state.ringingCall = data;
            renderOverlays();
        }

        function handleAccepted(data) {
            state.ringingCall = null;
            renderOverlays();
            stopRingtone();
            // Caller goes to the room
            navigateToRoom(data.roomName, 'client');
        }

        function handleJoinRoom(data) {
            state.incomingCall = null;
            renderOverlays();
            stopRingtone();
            // Callee goes to the room
            navigateToRoom(data.roomName, 'client');
        }

        function handleDeclined(data) {
            state.ringingCall = null;
            renderOverlays();
            stopRingtone();
            alert(data.calleeName + ' declined your call.');
        }

        function handleTargetOffline(data) {
            state.ringingCall = null;
            renderOverlays();
            alert(data.calleeName + ' is currently offline. A missed call notification has been saved for them.');
        }

        function handleCallFailed(data) {
            state.ringingCall = null;
            renderOverlays();
            alert('Call failed: ' + (data.message || 'Unknown error'));
        }

        function handleCallCancelled() {
            state.incomingCall = null;
            renderOverlays();
            stopRingtone();
        }

        function handleCallEnded(data) {
            stopRingtone();
            if (data && data.endedBy) {
                alert('Call ended by ' + data.endedBy);
            }
        }

        // ============================================
        // RINGTONE
        // ============================================

        function playRingtone() {
            const audio = document.getElementById('ringtone');
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(function() {});
            }
        }

        function stopRingtone() {
            const audio = document.getElementById('ringtone');
            if (audio) {
                audio.pause();
                audio.currentTime = 0;
            }
        }

        // ============================================
        // BROWSER NOTIFICATIONS
        // ============================================

        function requestNotificationPermission() {
            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }
        }

        function showBrowserNotification(title, body) {
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification(title, { body: body, icon: brandLogo(true) });

        // ============================================
        // OVERLAY RENDERING
        // ============================================

        function renderOverlays() {
            const container = document.getElementById('overlays');

            // Incoming call overlay (highest priority)
            if (state.incomingCall) {
                const call = state.incomingCall;
                container.innerHTML = `
                    <div class="overlay">

                        </div>
                    </div>
                `;
                return;
            }

            // Ringing overlay
            if (state.ringingCall) {
                const call = state.ringingCall;
                container.innerHTML = `
                    <div class="overlay">
                        <div class="pulse-animation" style="width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:36px">
                            &#128222;

                        <div class="overlay-buttons">
                            <button class="overlay-btn overlay-btn-cancel" data-action="p2p-cancel" title="Cancel">&#10006;</button>
                        </div>
                    </div>
                `;
                return;
            }

            // Queue waiting overlay — shown while searching for an interpreter.
            if (state.queueRequest) {
                const q = state.queueRequest;
                container.innerHTML = `
                    <div class="overlay">
                        <div class="pulse-animation" style="width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:36px">
                            &#128483;
                        </div>
                        <div class="overlay-caller-name">Finding an interpreter…</div>
                        <div class="overlay-status">Position in queue: ${q.position || 1} &nbsp;·&nbsp; Language: ${q.language || 'ASL'}</div>

                            <button class="overlay-btn overlay-btn-cancel" data-action="cancel-queue-request" title="Cancel">&#10006;</button>
                        </div>
                    </div>
                `;
                return;

            container.innerHTML = '';

        // ============================================
        // VRS QUEUE ACTIONS (exposed globally)
        // ============================================

        /** Send a Request Interpreter WS message and enter the waiting overlay. */
        window.__requestInterpreter = function(language) {
            const user = getUser();
            wsSend({
                type: 'request_interpreter',
                data: {
                    language: language || 'ASL',
                    clientName: user ? user.name : undefined,
                    inviteTokens: (state.vriInvites || []).map(invite => invite.token).filter(Boolean)
                }
            });
            // Optimistic UI: show the queue overlay immediately; the server
            // will correct position/roomName when it replies with request_queued.
            state.queueRequest = { position: 1, language: language || 'ASL', callType: 'vri' };
            renderOverlays();
        };

        window.__vriInviteField = function(field, value) {
            if (!['guestName', 'guestEmail', 'guestPhone'].includes(field)) return;
            state.vriInviteForm = { ...(state.vriInviteForm || {}), [field]: value };
        };

        window.__prepareVriInvite = function() {
            const form = state.vriInviteForm || {};
            wsSend({
                type: 'prepare_vri_invite',
                data: {
                    guestName: form.guestName || undefined,
                    guestEmail: form.guestEmail || undefined,
                    guestPhone: form.guestPhone || undefined
                }
            });
            state.vriInviteStatus = 'Preparing invite link...';
            render();
        };

        window.__copyVriInvite = async function(index) {
            const invite = (state.vriInvites || [])[index];
            if (!invite || !invite.inviteUrl) return;
            try {
                await navigator.clipboard.writeText(invite.inviteUrl);
                state.vriInviteStatus = 'Invite link copied.';
            } catch (e) {
                state.vriInviteStatus = invite.inviteUrl;
            }
            render();
        };

        /** Cancel the current queue request. */
        window.__cancelQueueRequest = function() {
            if (!state.queueRequest || !state.queueRequest.requestId) {
                // Not confirmed by server yet — just clear the optimistic state.
                state.queueRequest = null;
                renderOverlays();
                return;
            }
            wsSend({
                type: 'cancel_request',
                data: { requestId: state.queueRequest.requestId }
            });
            state.queueRequest = null;
            renderOverlays();
        };

        // ============================================
        // P2P ACTIONS (exposed globally)
        // ============================================

        /** Flow 1: enter hearing person's number → request interpreter → waiting overlay → auto-join. */
        window.__dialViaInterpreter = function() {
            const input = document.getElementById('dial-phone');
            if (!input) return;
            const phone = input.value.trim();
            if (!phone) return;

            const user = getUser();
            wsSend({
                type: 'request_interpreter',
                data: {
                    language: 'ASL',
                    clientName: user ? user.name : undefined,
                    targetPhone: phone
                }
            });

            // Optimistic waiting overlay; server corrects position/roomName on request_queued.
            state.queueRequest = { position: 1, language: 'ASL', targetPhone: phone };
            renderOverlays();
        };

        window.__p2pDial = function() {
            const input = document.getElementById('dial-phone');
            if (!input) return;
            const phone = input.value.trim();
            if (!phone) return;

            wsSend({
                type: 'p2p_call',
                data: { phoneNumber: phone }
            });
        };

        window.__p2pAccept = function() {
            if (!state.incomingCall) return;
            wsSend({
                type: 'p2p_accept',
                data: state.incomingCall
            });
        };

        window.__p2pDecline = function() {
            if (!state.incomingCall) return;
            wsSend({
                type: 'p2p_decline',
                data: state.incomingCall
            });
            state.incomingCall = null;
            stopRingtone();
            renderOverlays();
        };

        window.__p2pCancel = function() {
            if (!state.ringingCall) return;
            wsSend({
                type: 'p2p_cancel',
                data: {
                    callId: state.ringingCall.callId,
                    calleeId: state.ringingCall.calleeId || null
                }
            });
            state.ringingCall = null;
            stopRingtone();
            renderOverlays();
        };

        window.__joinRoom = function(roomName) {
            if (isVriOnlyAccount()) {

                return;
            }
            navigateToRoom(roomName, 'client');
        };

        window.__callBack = function(phone) {
            if (!phone) {
                alert('This caller does not have a callback number on file.');

        window.__addHistoryContact = async function(name, phone) {
            if (!phone) {
                state.contactStatus = { type: 'error', message: 'This call does not have a phone number to save.' };
                render();
                return;
            }

            try {
                const response = await fetch(API_BASE + '/api/contacts', {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify({
                        name: name || phone,
                        phoneNumber: phone,
                        organization: 'Personal',
                        notes: 'Added from call history.'
                    })
                });
                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to add contact.');
                }
                await loadContacts();
                state.contactStatus = { type: 'success', message: 'Contact added from call history.' };
            } catch (error) {
                state.contactStatus = { type: 'error', message: error.message || 'Failed to add contact.' };
            }
            render();
        };

        // FORMAT
        // ============================================

        function formatDate(iso) {
            if (!iso) return '';
            const d = new Date(iso);
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
                + ', ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, function(char) {
                return ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#39;'
                })[char];
            });
        }

        function checked(value) {
            return value ? 'checked' : '';
        }

        function callDurationMinutes(call) {
            const duration = Number(call?.duration_minutes || call?.durationMinutes || 0);
            return Number.isFinite(duration) ? duration : 0;
        }

        function callContactName(call) {
            return call?.callee_name || call?.caller_name || call?.client_name || '';
        }

        function callContactPhone(call) {
            return call?.callee_phone || call?.caller_phone || call?.target_phone || '';
        }

        function renderAddContactButton(call) {
            const phone = callContactPhone(call);

            if (!phone) {
                return '';
            }

            const name = callContactName(call) || phone;

            return `
                <button class="settings-btn secondary"
                    data-action="add-history-contact"
                    data-contact-name="${escapeHtml(name)}"
                    data-contact-phone="${escapeHtml(phone)}">
                    Add Contact
                </button>
            `;
        }

        function getUsageSummary(calls) {
            const now = new Date();
            const dayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            const weekStart = now.getTime() - (7 * 24 * 60 * 60 * 1000);
            const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
            const summary = {
                day: { calls: 0, minutes: 0 },
                week: { calls: 0, minutes: 0 },
                month: { calls: 0, minutes: 0 }
            };

            (calls || []).forEach(call => {
                const started = new Date(call.started_at || call.startedAt || call.created_at || 0).getTime();
                if (!started || Number.isNaN(started)) return;
                const minutes = callDurationMinutes(call);

                if (started >= dayStart) {
                    summary.day.calls += 1;
                    summary.day.minutes += minutes;
                }
                if (started >= weekStart) {
                    summary.week.calls += 1;
                    summary.week.minutes += minutes;
                }
                if (started >= monthStart) {
                    summary.month.calls += 1;
                    summary.month.minutes += minutes;
                }
            });

            return summary;
        }

        function dispatchUiAction(action, element, event) {
            if (!action) return;

            switch (action) {
                case 'p2p-accept': return window.__p2pAccept();
                case 'p2p-decline': return window.__p2pDecline();
                case 'p2p-cancel': return window.__p2pCancel();
                case 'cancel-queue-request': return window.__cancelQueueRequest();
                case 'request-interpreter': return window.__requestInterpreter('ASL');
                case 'vri-invite-field': return window.__vriInviteField(element.dataset.field, element.value);
                case 'prepare-vri-invite': return window.__prepareVriInvite();
                case 'copy-vri-invite': return window.__copyVriInvite(Number(element.dataset.index || 0));
                case 'search-contacts': return window.__searchContacts(document.getElementById('contact-search')?.value || '');
                case 'sync-contacts': return window.__syncContacts();
                case 'import-device-contacts': return window.__importDeviceContacts();
                case 'connect-google-contacts': return window.__connectGoogleContacts();
                case 'migrate-speed-dial': return window.__migrateSpeedDial();
                case 'open-contact-file-picker': return document.getElementById('contacts-csv-input')?.click();
                case 'import-contacts-file': return window.__importContactsFile(element.files && element.files[0]);
                case 'open-contact': return window.__openContact(element.dataset.contactId);
                case 'close-contact': return window.__closeContact();
                case 'call-contact': return window.__callContact(element.dataset.phone || '');
                case 'toggle-favorite-contact': return window.__toggleFavoriteContact(element.dataset.contactId, element.dataset.favorite === 'true');
                case 'add-contact-note': return window.__addContactNote(element.dataset.contactId);
                case 'set-auth-tab': return window.__setAuthTab(element.dataset.tab);
                case 'login-email': return window.__loginEmail();
                case 'login-phone': return window.__loginPhone();
                case 'request-otp': return window.__requestOtp();
                case 'set-auth-screen': return window.__setAuthScreen(element.dataset.screen);
                case 'register': return window.__register();
                case 'forgot-password': return window.__forgotPassword();
                case 'reset-password': return window.__resetPassword();
                case 'verify-otp': return window.__verifyOtp();
                case 'sign-out': return window.__signOut();
                case 'start-self-preview': return startSelfPreview(false);
                case 'stop-self-preview': return stopSelfPreview();
                case 'select-camera-device': return selectCameraDevice(element.value);
                case 'select-mic-device': return selectMicDevice(element.value);
                case 'toggle-password-visibility': return togglePasswordVisibility(element.dataset.target, element);
                case 'open-profile-section': return openProfileSection(element.dataset.sectionId);
                case 'set-profile-view':
                    state.profileView = element.dataset.view || 'home';
                    render();
                    return;
                case 'start-call': return window.__startCall();
                case 'dial-via-interpreter': return window.__dialViaInterpreter();
                case 'open-tts-panel':
                    if (isVriOnlyAccount()) return;
                    window.location.href = 'tts-panel.html';
                    return;
                case 'join-room': return window.__joinRoom(element.dataset.roomName);
                case 'call-back': return window.__callBack(element.dataset.phone || '');
                case 'add-history-contact': return window.__addHistoryContact(element.dataset.contactName || '', element.dataset.contactPhone || '');
                case 'mark-missed-seen': return window.__markMissedSeen();
                case 'form-field': return window.__formField(element.dataset.field, element.value);
                case 'save-speed-dial': return window.__saveSpeedDial();
                case 'cancel-form': return window.__cancelForm();
                case 'edit-entry':
                    if (event) event.stopPropagation();
                    return window.__editEntry(element.dataset.entryId);
                case 'delete-entry':
                    if (event) event.stopPropagation();
                    return window.__deleteEntry(element.dataset.entryId);
                case 'show-add-form': return window.__showAddForm();
                case 'save-client-profile': return window.__saveClientProfile();
                case 'preview-theme': return window.__previewTheme(element.value);
                case 'save-client-preferences': return window.__saveClientPreferences();
                case 'change-client-password': return window.__changeClientPassword();
            }
        }

        document.addEventListener('click', function(event) {
            const actionElement = event.target.closest('[data-action]');
            if (!actionElement || !document.body.contains(actionElement)) return;
            if (actionElement.disabled) return;
            event.preventDefault();
            dispatchUiAction(actionElement.dataset.action, actionElement, event);
        });

        document.addEventListener('change', function(event) {
            const actionElement = event.target.closest('[data-change-action]');
            if (!actionElement || !document.body.contains(actionElement)) return;
            dispatchUiAction(actionElement.dataset.changeAction, actionElement, event);
        });

        document.addEventListener('keydown', function(event) {
            const isActivationKey = event.key === 'Enter' || event.key === ' ';
            if (!isActivationKey) return;

            const actionElement = event.target.closest('[data-enter-action]');
            if (event.key === 'Enter' && actionElement && document.body.contains(actionElement)) {
                event.preventDefault();
                dispatchUiAction(actionElement.dataset.enterAction, actionElement, event);
                return;
            }

            const roleButton = event.target.closest('[role="button"][data-action], .speed-dial-card[data-action]');
            if (!roleButton || !document.body.contains(roleButton)) return;
            if (/^(BUTTON|A|INPUT|SELECT|TEXTAREA)$/.test(event.target.tagName)) return;
            event.preventDefault();
            dispatchUiAction(roleButton.dataset.action, roleButton, event);
        });

        function initials(name) {
            return String(name || '?')
                .split(/\s+/)
                .filter(Boolean)
                .slice(0, 2)
                .map(part => part.charAt(0).toUpperCase())
                .join('') || '?';
        }

        function renderTimelineItem(item) {
            const type = item.type || 'event';
            const data = item.data || {};
            const title = type === 'call'

                : type === 'note'

                    : type === 'voicemail'

            return `
                <div class="timeline-item">
                    <div class="timeline-title">${escapeHtml(title)}</div>
                    <div class="timeline-time">${formatDate(item.timestamp || data.created_at || data.started_at)}</div>
                </div>
            `;
        }
