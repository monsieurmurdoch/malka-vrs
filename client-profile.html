        function renderAuth() {
            const app = document.getElementById('app');
            const screen = state.authScreen;

            if (screen === 'reset') {
                const urlParams = new URLSearchParams(window.location.search);
                renderResetPassword(app, urlParams.get('reset-token'), urlParams.get('reset-user'), urlParams.get('reset-role'));
                return;
            }

            if (screen === 'forgot') {
                renderForgotPassword(app);
                return;
            }

            if (screen === 'otp-verify') {
                renderOtpVerify(app);
                return;
            }

            if (screen === 'register') {
                renderRegister(app);
                return;
            }

            // Default: login screen
            renderLogin(app);
        }

        function handleAuthResponse(data, errorMsg) {
            if (!data) {
                state.authError = 'Network error. Please try again.';
                state.authLoading = false;
                renderAuth();
                return null;
            }
            if (data.error) {
                state.authError = data.error;
                state.authLoading = false;
                renderAuth();
                return null;
            }
            return data;
        }

        window.__loginEmail = async function() {

            const password = document.getElementById('login-password')?.value;
            if (!email || !password) { state.authError = 'Please fill in all fields.'; renderAuth(); return; }

            state.authLoading = true;
            state.authError = '';
            renderAuth();

            try {
                const res = await fetch(API_BASE + '/api/auth/client/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (handleAuthResponse(data)) {
                    setPersistentItem('vrs_auth_token', JSON.stringify({ token: data.token }));
                    setPersistentItem('vrs_user_info', JSON.stringify(data.user));
                    init();
                }
            } catch (e) {
                state.authError = 'Network error. Please try again.';
                state.authLoading = false;
                renderAuth();

        window.__resetPassword = async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('reset-token');
            const userId = urlParams.get('reset-user');
            const role = urlParams.get('reset-role');
            const newPassword = document.getElementById('reset-new-password')?.value;
            const confirm = document.getElementById('reset-confirm-password')?.value;

            if (!newPassword || newPassword.length < 8) { state.authError = 'Password must be at least 8 characters.'; renderAuth(); return; }
            if (newPassword !== confirm) { state.authError = 'Passwords do not match.'; renderAuth(); return; }

            state.authLoading = true;
            state.authError = '';
            renderAuth();

            try {
                const res = await fetch(API_BASE + '/api/auth/password/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, userId, role, newPassword })

                const data = await res.json();
                state.authLoading = false;
                if (data && data.success) {
                    state.authSuccess = 'Password reset successfully! You can now sign in.';
                    state.authScreen = 'login';

                    state.authError = data?.error || 'Reset failed. The link may have expired.';

                renderAuth();

                state.authError = 'Network error. Please try again.';
                state.authLoading = false;

                await apiFetch('/api/client/speed-dial', {
                    method: 'POST',
                    body: JSON.stringify({ name, phoneNumber: phone, category: 'personal' })
                });
            }

            state.showAddForm = false;
            state.editEntry = null;
            await loadSpeedDial();
            render();
        };

        window.__editEntry = function(id) {
            const entry = state.speedDial.find(e => e.id === id);
            if (entry) {
                state.editEntry = entry;
                state.showAddForm = false;
                state.newName = entry.name;
                state.newPhone = entry.phone_number;
                render();
            }
        };

        window.__deleteEntry = async function(id) {
            await apiFetch('/api/client/speed-dial/' + id, { method: 'DELETE' });
            await loadSpeedDial();
            render();
        };

        window.__searchContacts = async function(search) {
            state.contactSearch = search || '';
            await loadContacts();
            render();
        };

        window.__openContact = async function(id) {
            const data = await apiFetch('/api/contacts/' + id);
            if (data && data.contact) {
                state.contactDetail = data.contact;
            }
            render();
        };

        window.__closeContact = function() {
            state.contactDetail = null;
            render();
        };

        window.__toggleFavoriteContact = async function(id, favorite) {
            await apiFetch('/api/contacts/' + id, {
                method: 'PUT',
                body: JSON.stringify({ isFavorite: !!favorite })
            });
            await loadContacts();
            if (state.contactDetail && state.contactDetail.id === id) {
                await window.__openContact(id);
                return;
            }
            render();
        };

        window.__addContactNote = async function(id) {
            const textarea = document.getElementById('contact-note');
            const content = textarea?.value?.trim();
            if (!content) return;

            const data = await apiFetch('/api/contacts/' + id + '/notes', {
                method: 'POST',
                body: JSON.stringify({ content })
            });
            if (data && data.note) {
                state.contactStatus = { type: 'success', message: 'Note saved.' };
            }
            await window.__openContact(id);
        };

        window.__syncContacts = async function() {
            await refreshContactsFromSync(true);
        };

        window.__importContactsFile = async function(file) {
            if (!file) return;
            try {
                const text = await file.text();
                const contacts = parseContactsCsv(text);
                await importContactsList(contacts, 'CSV');
            } catch (error) {
                state.contactStatus = { type: 'error', message: error.message || 'Import failed.' };
                render();
            }
        };

        window.__importDeviceContacts = async function() {
            if (!navigator.contacts || !navigator.contacts.select) {
                state.contactStatus = { type: 'error', message: 'Phone contact picker is not available in this browser. Use CSV or Google import.' };
                render();
                return;
            }

            try {
                const picked = await navigator.contacts.select(['name', 'email', 'tel'], { multiple: true });
                const contacts = picked.map(contact => ({
                    name: Array.isArray(contact.name) ? contact.name[0] : contact.name,
                    email: Array.isArray(contact.email) ? contact.email[0] : contact.email,
                    phone_number: Array.isArray(contact.tel) ? contact.tel[0] : contact.tel
                })).filter(contact => contact.name || contact.email || contact.phone_number);
                await importContactsList(contacts, 'phone');
            } catch (error) {
                if (error && error.name === 'AbortError') return;
                state.contactStatus = { type: 'error', message: error.message || 'Phone contact import failed.' };
                render();
            }
        };

        window.__connectGoogleContacts = async function() {
            try {
                const auth = await apiFetch('/api/google-contacts/auth-url');
                if (!auth || !auth.url) {
                    throw new Error(auth?.error || 'Google Contacts is not configured.');
                }

                const popup = window.open(auth.url, 'google-contacts-auth', 'width=520,height=680');
                state.contactStatus = { type: 'success', message: 'Complete Google sign-in, then this page will import selected contacts.' };
                render();

                const startedAt = Date.now();
                const timer = setInterval(async () => {
                    if ((popup && popup.closed) || Date.now() - startedAt > 120000) {
                        clearInterval(timer);
                        await fetchAndImportGoogleContacts();
                    }
                }, 1000);
            } catch (error) {
                state.contactStatus = { type: 'error', message: error.message || 'Google Contacts import failed.' };
                render();
            }
        };

        window.__migrateSpeedDial = async function() {
            const data = await apiFetch('/api/contacts/migrate-speed-dial', { method: 'POST' });
            state.contactStatus = { type: 'success', message: `Synced ${data?.migrated || 0} speed dial contact${data?.migrated === 1 ? '' : 's'} into contacts.` };
            await loadContacts();
            render();
        };

        // ============================================
        // DATA LOADING
        // ============================================

        function normalizeContactImport(entry) {
            return {
                name: entry.name || entry.Name || entry.fullName || entry['Full Name'] || entry.phone_number || entry.phoneNumber || entry.email || 'Unnamed Contact',
                email: entry.email || entry.Email || '',
                phone_number: entry.phone_number || entry.phoneNumber || entry.phone || entry.Phone || entry.tel || '',
                organization: entry.organization || entry.Organization || entry.company || entry.Company || '',
                notes: entry.notes || entry.Notes || ''
            };
        }

        function parseContactsCsv(text) {
            const lines = String(text || '').split(/\r?\n/).filter(line => line.trim());
            if (!lines.length) {
                throw new Error('No contacts found in file.');
            }

            const headers = lines[0].split(',').map(header => header.trim());
            const contacts = lines.slice(1).map(line => {
                const values = line.split(',').map(value => value.trim());
                const row = {};
                headers.forEach((header, index) => {
                    row[header] = values[index] || '';
                });
                return normalizeContactImport(row);
            }).filter(contact => contact.name || contact.phone_number || contact.email);

            if (!contacts.length) {
                throw new Error('No usable contacts found in file.');
            }

            return contacts;
        }

        async function importContactsList(contacts, source) {
            if (!contacts.length) {
                state.contactStatus = { type: 'error', message: 'No contacts selected.' };
                render();
                return;
            }

            const data = await apiFetch('/api/contacts/import', {
                method: 'POST',
                body: JSON.stringify({ contacts: contacts.map(normalizeContactImport) })
            });
            const imported = data?.imported || 0;
            const skipped = data?.skipped || 0;
            state.contactStatus = { type: 'success', message: `Imported ${imported} ${source} contact${imported === 1 ? '' : 's'}${skipped ? `; skipped ${skipped} duplicate${skipped === 1 ? '' : 's'}` : ''}.` };
            await loadContacts();
            render();
        }

        async function fetchAndImportGoogleContacts() {
            try {
                const data = await apiFetch('/api/google-contacts/fetch', { method: 'POST' });
                const contacts = data?.contacts || [];
                await importContactsList(contacts, 'Google');
            } catch (error) {
                state.contactStatus = { type: 'error', message: error.message || 'Google Contacts fetch failed.' };
                render();
            }
        }

        async function refreshContactsFromSync(showStatus) {
            const since = state.contactSyncSince || getPersistentItem('vrs_contacts_sync_since') || '';
            const path = '/api/contacts/sync' + (since ? `?since=${encodeURIComponent(since)}` : '');
            const data = await apiFetch(path);
            if (data && data.serverTimestamp) {
                state.contactSyncSince = data.serverTimestamp;
                setPersistentItem('vrs_contacts_sync_since', data.serverTimestamp);
            }
            if (!since || (data && data.changes && data.changes.length)) {
                await loadContacts();
                if (state.contactDetail) {
                    const detail = await apiFetch('/api/contacts/' + state.contactDetail.id);
                    state.contactDetail = detail?.contact || null;
                }
            }
            if (showStatus) {
                state.contactStatus = { type: 'success', message: 'Contacts synced across devices.' };
            }
            render();
        }

        async function loadProfile() {
            const data = await apiFetch('/api/client/profile');
            if (data) state.profile = data;
        }

        async function loadCallHistory() {
            const data = await apiFetch('/api/client/call-history?limit=20');
            if (data && data.calls) state.calls = data.calls;
        }

        async function loadSpeedDial() {
            const data = await apiFetch('/api/client/speed-dial');
            if (data && data.entries) state.speedDial = data.entries;
        }

        async function loadContacts() {
            const query = state.contactSearch ? `?search=${encodeURIComponent(state.contactSearch)}` : '';
            const data = await apiFetch('/api/contacts' + query);
            if (data && data.contacts) state.contacts = data.contacts;
        }

        async function loadPreferences() {
            const data = await apiFetch('/api/client/preferences');
            if (data) {
                state.preferences = data;
                applyTheme(data.dark_mode);
                applyLanguage(getPreferredLanguage());
            } else {
                applyTheme(getPersistentItem('vrs_dark_mode') || 'system');
                applyLanguage(getPreferredLanguage());
            }
        }

        async function loadMissedCalls() {
            const data = await apiFetch('/api/client/missed-calls');
            if (data) state.missedCalls = data.missedCalls || data.missed || [];
        }

        async function loadActiveRooms() {
            const data = await apiFetch('/api/client/active-rooms');
            if (data && data.rooms) state.activeRooms = data.rooms;
        }

        // ============================================
        // INIT
        // ============================================

        async function init() {
            applyTheme(getPersistentItem('vrs_dark_mode') || 'system');
            applyLanguage(getPreferredLanguage());
            const user = getUser();
            const token = getToken();

            // Check for password reset URL params first
            const urlParams = new URLSearchParams(window.location.search);
            const resetToken = urlParams.get('reset-token');
            if (resetToken) {
                state.authScreen = 'reset';
                renderAuth();
                return;
            }

            if (!user || !token || user.role !== 'client') {
                renderAuth();
                return;
            }

            await refreshMediaDevices();
            render();
            await Promise.all([loadProfile(), loadPreferences(), loadCallHistory(), loadSpeedDial(), loadContacts(), loadMissedCalls(), loadActiveRooms()]);
            render();
            if (navigator.mediaDevices && navigator.mediaDevices.addEventListener) {
                navigator.mediaDevices.addEventListener('devicechange', async () => {
                    await refreshMediaDevices();
                    render();
                });
            }

            // Connect WebSocket for real-time P2P calling
            connectWebSocket();
            requestNotificationPermission();
            setInterval(() => refreshContactsFromSync(false), 60000);
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    refreshContactsFromSync(false);
                }
            });
        }

        init();
    })();
    </script>
</body>
</html>
