<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MalkaVRI - Client Profile</title>
    <link rel="stylesheet" href="css/all.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a4d6e 0%, #2d5a3d 50%, #4a3b2a 100%);
            min-height: 100vh;
            color: #fff;
        }

        /* Header */
        .profile-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .profile-header-left {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }

        .profile-header-logo {
            max-width: 120px;
            height: auto;
        }

        .profile-header-title {
            font-size: 20px;
            font-weight: 300;
            opacity: 0.8;
        }

        .profile-header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .profile-user-name {
            font-size: 14px;
            opacity: 0.7;
        }

        .sign-out-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            padding: 8px 20px;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .sign-out-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        /* Main grid */
        .profile-main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
        }

        /* Card base */
        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 24px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* VRS Number card */
        .vrs-number {
            font-size: 28px;
            font-weight: 700;
            color: #4caf50;
            margin: 8px 0 16px;
            letter-spacing: 1px;
        }

        .vrs-number-label {
            font-size: 12px;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .start-call-btn {
            width: 100%;
            padding: 14px;
            background: #4caf50;
            border: none;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .start-call-btn:hover {
            background: #43a047;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(76,175,80,0.35);
        }

        /* Phone dialer */
        .dialer-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .dialer-input {
            flex: 1;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: #fff;
            padding: 10px 12px;
            font-size: 15px;
            font-family: monospace;
        }

        .dialer-input::placeholder { color: rgba(255,255,255,0.3); }
        .dialer-input:focus { outline: none; border-color: #4caf50; }

        .dialer-btn {
            padding: 10px 20px;
            background: #2196f3;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .dialer-btn:hover { background: #1976d2; }
        .dialer-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Call history */
        .call-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .call-item:last-child {
            border-bottom: none;
        }

        .call-date {
            font-size: 14px;
            opacity: 0.6;
        }

        .call-duration {
            font-size: 14px;
            font-weight: 500;
            color: #4caf50;
        }

        .call-interpreter {
            font-size: 12px;
            opacity: 0.4;
            margin-top: 2px;
        }

        .empty-state {
            text-align: center;
            padding: 32px 16px;
            opacity: 0.4;
            font-size: 14px;
        }

        /* Speed dial */
        .speed-dial-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .speed-dial-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .speed-dial-card:hover {
            background: rgba(255,255,255,0.12);
            border-color: #4caf50;
        }

        .speed-dial-name {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .speed-dial-number {
            font-size: 13px;
            opacity: 0.6;
            font-family: monospace;
        }

        .speed-dial-actions {
            position: absolute;
            top: 8px;
            right: 8px;
            display: flex;
            gap: 4px;
        }

        .speed-dial-actions button {
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 4px;
            color: #fff;
            cursor: pointer;
            font-size: 11px;
            padding: 3px 7px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .speed-dial-card:hover .speed-dial-actions button {
            opacity: 0.7;
        }

        .speed-dial-actions button:hover {
            opacity: 1 !important;
            background: rgba(255,255,255,0.2);
        }

        .add-speed-dial-btn {
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px dashed rgba(255,255,255,0.2);
            border-radius: 8px;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .add-speed-dial-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border-color: #4caf50;
        }

        /* Inline form */
        .inline-form {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .inline-form input {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            color: #fff;
            padding: 10px 12px;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .inline-form input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .inline-form input:focus {
            outline: none;
            border-color: #4caf50;
        }

        .inline-form-actions {
            display: flex;
            gap: 8px;
        }

        .inline-form-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .btn-save {
            background: #4caf50;
            color: #fff;
        }

        .btn-cancel {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            opacity: 0.5;
        }

        /* Auth redirect */
        .auth-redirect {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            flex-direction: column;
            gap: 16px;
        }

        .auth-redirect p {
            opacity: 0.7;
        }

        /* Active rooms card */
        .active-room-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .active-room-item:last-child { border-bottom: none; }

        .active-room-info { font-size: 14px; opacity: 0.8; }
        .active-room-time { font-size: 12px; opacity: 0.4; margin-top: 2px; }

        .join-room-btn {
            padding: 6px 14px;
            background: #4caf50;
            border: none;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .join-room-btn:hover { background: #43a047; }

        /* Missed calls card */
        .card-missed-calls {
            border-color: rgba(244,67,54,0.3);
        }

        .missed-call-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .missed-call-item:last-child { border-bottom: none; }

        .missed-call-name { font-size: 14px; font-weight: 500; }
        .missed-call-time { font-size: 12px; opacity: 0.4; margin-top: 2px; }

        .call-back-btn {
            padding: 5px 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .call-back-btn:hover { background: rgba(255,255,255,0.2); }

        /* Full-screen overlays */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            flex-direction: column;
            gap: 24px;
        }

        .overlay-caller-name {
            font-size: 32px;
            font-weight: 600;
        }

        .overlay-status {
            font-size: 18px;
            opacity: 0.7;
        }

        .overlay-buttons {
            display: flex;
            gap: 20px;
            margin-top: 12px;
        }

        .overlay-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .overlay-btn:hover { transform: scale(1.1); }

        .overlay-btn-accept {
            background: #4caf50;
            color: #fff;
        }

        .overlay-btn-decline {
            background: #f44336;
            color: #fff;
        }

        .overlay-btn-cancel {
            background: rgba(255,255,255,0.15);
            color: #fff;
            width: 60px;
            height: 60px;
            font-size: 22px;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .pulse-animation {
            position: relative;
        }

        .pulse-animation::before {
            content: '';
            position: absolute;
            top: -8px; left: -8px; right: -8px; bottom: -8px;
            border-radius: 50%;
            border: 3px solid #2196f3;
            animation: pulse-ring 1.5s ease-out infinite;
        }

        .ws-status {
            font-size: 11px;
            opacity: 0.4;
            padding: 4px 0;
            text-align: center;
        }

        .ws-connected { color: #4caf50; }
        .ws-disconnected { color: #f44336; }

        /* Auth / Login page styles */
        .auth-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .auth-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 420px;
        }

        .auth-logo {
            display: block;
            margin: 0 auto 16px;
            max-width: 140px;
        }

        .auth-title {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .auth-subtitle {
            text-align: center;
            font-size: 14px;
            opacity: 0.6;
            margin-bottom: 24px;
        }

        .auth-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            overflow: hidden;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.5);
            transition: all 0.2s ease;
        }

        .auth-tab.active {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }

        .auth-tab:hover:not(.active) {
            color: rgba(255,255,255,0.8);
        }

        .auth-field {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: #fff;
            padding: 12px 14px;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .auth-field::placeholder { color: rgba(255,255,255,0.3); }
        .auth-field:focus { outline: none; border-color: #4caf50; }

        .auth-submit {
            width: 100%;
            padding: 13px;
            background: #4caf50;
            border: none;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s ease;
            margin-top: 4px;
        }

        .auth-submit:hover { background: #43a047; }
        .auth-submit:disabled { opacity: 0.5; cursor: not-allowed; }

        .auth-error {
            background: rgba(244,67,54,0.15);
            border: 1px solid rgba(244,67,54,0.3);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: #f44336;
            margin-bottom: 12px;
        }

        .auth-success {
            background: rgba(76,175,80,0.15);
            border: 1px solid rgba(76,175,80,0.3);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: #4caf50;
            margin-bottom: 12px;
        }

        .auth-link {
            color: #64b5f6;
            cursor: pointer;
            text-decoration: none;
            font-size: 13px;
        }

        .auth-link:hover { text-decoration: underline; }

        .auth-footer {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            opacity: 0.6;
        }

        .auth-divider {
            text-align: center;
            margin: 16px 0;
            font-size: 12px;
            opacity: 0.3;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .profile-main {
                grid-template-columns: 1fr;
                padding: 16px;
            }

            .profile-header {
                padding: 12px 16px;
                flex-wrap: wrap;
                gap: 8px;
            }

            .profile-header-title {
                display: none;
            }

            .overlay-caller-name { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <!-- Overlays rendered by JS outside #app to persist across re-renders -->
    <div id="overlays"></div>

    <!-- Hidden audio element for ringtone -->
    <audio id="ringtone" src="sounds/ring.mp3" loop preload="auto"></audio>

    <script src="config.js"></script>
    <script>
    (function() {
        const IS_LOCAL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

        function isLoopbackUrl(value) {
            if (!value) {
                return false;
            }

            try {
                const parsed = new URL(value, window.location.origin);
                return parsed.hostname === 'localhost' || parsed.hostname === '127.0.0.1';
            } catch (error) {
                return false;
            }
        }

        function preferConfiguredUrl(configuredValue, fallbackValue) {
            if (!configuredValue) {
                return fallbackValue;
            }

            if (!IS_LOCAL && isLoopbackUrl(configuredValue)) {
                return fallbackValue;
            }

            return configuredValue;
        }

        const API_BASE = (function() {
            const configured = typeof config !== 'undefined' && config.vrs && config.vrs.queueServiceUrl
                ? config.vrs.queueServiceUrl.replace(/^ws/, 'http').replace(/\/ws$/, '')
                : null;
            return preferConfiguredUrl(configured, window.location.origin);
        })();

        const WS_URL = (function() {
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const fallback = `${wsProtocol}//${window.location.host}/ws`;
            const configured = typeof config !== 'undefined' && config.vrs && config.vrs.queueServiceUrl
                ? config.vrs.queueServiceUrl
                : null;
            return preferConfiguredUrl(configured, fallback);
        })();

        function getPersistentItem(key) {
            try {
                const localValue = localStorage.getItem(key);
                if (localValue !== null) {
                    sessionStorage.setItem(key, localValue);
                    return localValue;
                }
            } catch (e) {}

            try {
                const sessionValue = sessionStorage.getItem(key);
                if (sessionValue !== null) {
                    localStorage.setItem(key, sessionValue);
                    return sessionValue;
                }
            } catch (e) {}

            return null;
        }

        function setPersistentItem(key, value) {
            try { localStorage.setItem(key, value); } catch (e) {}
            try { sessionStorage.setItem(key, value); } catch (e) {}
        }

        function clearPersistentAuth() {
            [
                'vrs_auth_token',
                'vrs_user_info',
                'vrs_user_role',
                'vrs_client_auth',
                'vrs_interpreter_auth'
            ].forEach(function(key) {
                try { localStorage.removeItem(key); } catch (e) {}
                try { sessionStorage.removeItem(key); } catch (e) {}
            });
        }

        function getToken() {
            try {
                const stored = JSON.parse(getPersistentItem('vrs_auth_token') || '{}');
                return stored.token || null;
            } catch(e) { return null; }
        }

        function getUser() {
            try {
                return JSON.parse(getPersistentItem('vrs_user_info') || 'null');
            } catch(e) { return null; }
        }

        function escapeAttr(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function authHeaders() {
            const token = getToken();
            return token ? { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' } : { 'Content-Type': 'application/json' };
        }

        async function apiFetch(path, options = {}) {
            const res = await fetch(API_BASE + path, { ...options, headers: { ...authHeaders(), ...(options.headers || {}) } });
            if (res.status === 401 || res.status === 403) {
                clearPersistentAuth();
                window.location.href = '/';
                return null;
            }
            return res.json();
        }

        // State
        let state = {
            profile: null,
            calls: [],
            speedDial: [],
            missedCalls: [],
            activeRooms: [],
            showAddForm: false,
            editEntry: null,
            newName: '',
            newPhone: '',
            newCategory: 'personal',
            // P2P call state
            incomingCall: null,   // { callId, roomName, callerName, callerId, calleeId }
            ringingCall: null,    // { callId, roomName, calleeName, calleePhone }
            // VRS queue state
            queueRequest: null,   // { requestId, position, roomName, language, targetPhone }
            wsConnected: false,
            // Auth state
            authScreen: 'login',  // 'login' | 'register' | 'forgot' | 'reset' | 'otp' | 'otp-verify'
            authTab: 'email',     // 'email' | 'phone' | 'sms'
            authError: '',
            authSuccess: '',
            authLoading: false,
            otpPhoneNumber: ''
        };

        // ============================================
        // WEBSOCKET CONNECTION
        // ============================================

        let ws = null;
        let wsReconnectTimer = null;

        function connectWebSocket() {
            const user = getUser();
            const token = getToken();
            if (!user || !token) return;

            ws = new WebSocket(WS_URL);

            ws.onopen = function() {
                console.log('[WS] Connected');
                state.wsConnected = true;
                // Authenticate
                ws.send(JSON.stringify({
                    type: 'auth',
                    role: 'client',
                    userId: user.id,
                    name: user.name,
                    token: token
                }));
            };

            ws.onmessage = function(event) {
                try {
                    const msg = JSON.parse(event.data);
                    handleWebSocketMessage(msg);
                } catch(e) {
                    console.error('[WS] Parse error:', e);
                }
            };

            ws.onclose = function() {
                console.log('[WS] Disconnected, reconnecting in 3s...');
                state.wsConnected = false;
                updateWsStatus();
                wsReconnectTimer = setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = function(err) {
                console.error('[WS] Error:', err);
            };
        }

        function updateWsStatus() {
            const el = document.getElementById('ws-status');
            if (el) {
                el.textContent = state.wsConnected ? 'Connected' : 'Reconnecting...';
                el.className = 'ws-status ' + (state.wsConnected ? 'ws-connected' : 'ws-disconnected');
            }
        }

        function wsSend(data) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(data));
            }
        }

        // ============================================
        // WEBSOCKET MESSAGE HANDLER
        // ============================================

        function handleWebSocketMessage(msg) {
            console.log('[WS] Received:', msg.type, msg);

            switch (msg.type) {
                case 'auth_success':
                    console.log('[WS] Auth success');
                    state.wsConnected = true;
                    updateWsStatus();
                    break;

                case 'auth_error':
                    console.error('[WS] Auth error:', msg.data);
                    break;

                case 'error':
                    if (state.queueRequest) {
                        state.queueRequest = null;
                        renderOverlays();
                    }
                    if (msg.data && msg.data.message) {
                        alert(msg.data.message);
                    }
                    break;

                case 'p2p_incoming_call':
                    handleIncomingCall(msg.data);
                    break;

                case 'p2p_ringing':
                    handleRinging(msg.data);
                    break;

                case 'p2p_accepted':
                    handleAccepted(msg.data);
                    break;

                case 'p2p_join_room':
                    handleJoinRoom(msg.data);
                    break;

                case 'p2p_declined':
                    handleDeclined(msg.data);
                    break;

                case 'p2p_target_offline':
                    handleTargetOffline(msg.data);
                    break;

                case 'p2p_call_failed':
                    handleCallFailed(msg.data);
                    break;

                case 'p2p_call_cancelled':
                    handleCallCancelled();
                    break;

                case 'p2p_call_ended':
                    handleCallEnded(msg.data);
                    break;

                case 'missed_calls':
                    if (msg.data && msg.data.length > 0) {
                        state.missedCalls = msg.data;
                        render();
                        showBrowserNotification('Missed Calls', 'You have ' + msg.data.length + ' missed call(s)');
                    }
                    break;

                // ── VRS queue responses ──────────────────────────────────────
                case 'request_queued':
                    // Server confirmed we're in queue. Show waiting UI.
                    state.queueRequest = msg.data;
                    renderOverlays();
                    break;

                case 'match_found':
                case 'meeting_initiated':
                    // Interpreter accepted — navigate both parties to the shared room.
                    if (msg.data && msg.data.roomName) {
                        state.queueRequest = null;
                        setPersistentItem('vrs_user_role', 'client');
                        window.location.href = '/' + msg.data.roomName + '?role=client';
                    }
                    break;

                case 'pong':
                case 'heartbeat_ack':
                    break;
            }
        }

        // P2P CALL UI HANDLERS
        // ============================================

        function handleIncomingCall(data) {
            state.incomingCall = data;
            renderOverlays();
            playRingtone();
            showBrowserNotification('Incoming Call', data.callerName + ' is calling you');
        }

        function handleRinging(data) {
            state.ringingCall = data;
            renderOverlays();
        }

        function handleAccepted(data) {
            state.ringingCall = null;
            renderOverlays();
            stopRingtone();
            // Caller goes to the room
            setPersistentItem('vrs_user_role', 'client');
            setPersistentItem('vrs_client_auth', 'true');
            window.location.href = '/' + data.roomName + '?role=client';
        }

        function handleJoinRoom(data) {
            state.incomingCall = null;
            renderOverlays();
            stopRingtone();
            // Callee goes to the room
            setPersistentItem('vrs_user_role', 'client');
            setPersistentItem('vrs_client_auth', 'true');
            window.location.href = '/' + data.roomName + '?role=client';
        }

        function handleDeclined(data) {
            state.ringingCall = null;
            renderOverlays();
            stopRingtone();
            alert(data.calleeName + ' declined your call.');
        }

        function handleTargetOffline(data) {
            state.ringingCall = null;
            renderOverlays();
            alert(data.calleeName + ' is currently offline. A missed call notification has been saved for them.');
        }

        function handleCallFailed(data) {
            state.ringingCall = null;
            renderOverlays();
            alert('Call failed: ' + (data.message || 'Unknown error'));
        }

        function handleCallCancelled() {
            state.incomingCall = null;
            renderOverlays();
            stopRingtone();
        }

        function handleCallEnded(data) {
            stopRingtone();
            if (data && data.endedBy) {
                alert('Call ended by ' + data.endedBy);

        // ============================================
        // VRS QUEUE ACTIONS (exposed globally)
        // ============================================

        /** Send a Request Interpreter WS message and enter the waiting overlay. */
        window.__requestInterpreter = function(language) {
            const user = getUser();
            wsSend({
                type: 'request_interpreter',
                data: {
                    language: language || 'ASL',
                    clientName: user ? user.name : undefined
                }
            });
            // Optimistic UI: show the queue overlay immediately; the server
            // will correct position/roomName when it replies with request_queued.
            state.queueRequest = { position: 1, language: language || 'ASL' };
            renderOverlays();
        };

        /** Cancel the current queue request. */
        window.__cancelQueueRequest = function() {
            if (!state.queueRequest || !state.queueRequest.requestId) {
                // Not confirmed by server yet — just clear the optimistic state.
                state.queueRequest = null;
                renderOverlays();
                return;
            }
            wsSend({
                type: 'cancel_request',
                data: { requestId: state.queueRequest.requestId }
            });
            state.queueRequest = null;
            renderOverlays();
        };

        // ============================================
        // P2P ACTIONS (exposed globally)
        // ============================================

        /** Flow 1: enter hearing person's number → request interpreter → waiting overlay → auto-join. */
        window.__dialViaInterpreter = function() {
            const input = document.getElementById('dial-phone');
            if (!input) return;
            const phone = input.value.trim();
            if (!phone) return;

            const user = getUser();
            wsSend({
                type: 'request_interpreter',
                data: {
                    language: 'ASL',
                    clientName: user ? user.name : undefined,
                    targetPhone: phone
                }
            });

            // Optimistic waiting overlay; server corrects position/roomName on request_queued.
            state.queueRequest = { position: 1, language: 'ASL', targetPhone: phone };
            renderOverlays();
        };

        window.__p2pDial = function() {
            const input = document.getElementById('dial-phone');
            if (!input) return;
            const phone = input.value.trim();
            if (!phone) return;

            wsSend({
                type: 'p2p_call',
                data: { phoneNumber: phone }
            });
        };

        window.__p2pAccept = function() {
            if (!state.incomingCall) return;
            wsSend({
                type: 'p2p_accept',
                data: state.incomingCall
            });
        };

        window.__p2pDecline = function() {
            if (!state.incomingCall) return;
            wsSend({
                type: 'p2p_decline',
                data: state.incomingCall
            });
            state.incomingCall = null;
            stopRingtone();
            renderOverlays();
        };

        window.__p2pCancel = function() {
            if (!state.ringingCall) return;
            wsSend({
                type: 'p2p_cancel',
                data: {
                    callId: state.ringingCall.callId,
                    calleeId: state.ringingCall.calleeId || null
                }
            });
            state.ringingCall = null;
            stopRingtone();
            renderOverlays();
        };

                const res = await fetch(API_BASE + '/api/auth/password/forgot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                state.authLoading = false;
                if (data && data.success) {
                    state.authSuccess = 'If an account exists with that email, a reset link has been sent. Check your inbox.';
                } else {
                    state.authError = data?.error || 'Something went wrong.';
                }
                renderAuth();
            } catch (e) {
                state.authError = 'Network error. Please try again.';
                state.authLoading = false;
                renderAuth();
            }
        };

        window.__resetPassword = async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('reset-token');
            const userId = urlParams.get('reset-user');
            const role = urlParams.get('reset-role');
            const newPassword = document.getElementById('reset-new-password')?.value;
            const confirm = document.getElementById('reset-confirm-password')?.value;

            if (!newPassword || newPassword.length < 8) { state.authError = 'Password must be at least 8 characters.'; renderAuth(); return; }
            if (newPassword !== confirm) { state.authError = 'Passwords do not match.'; renderAuth(); return; }

            state.authLoading = true;
            state.authError = '';
            renderAuth();

            try {
                const res = await fetch(API_BASE + '/api/auth/password/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, userId, role, newPassword })
                });
                const data = await res.json();
                state.authLoading = false;
                if (data && data.success) {
                    state.authSuccess = 'Password reset successfully! You can now sign in.';
                    state.authScreen = 'login';
                    window.history.replaceState({}, '', window.location.pathname);
                } else {
                    state.authError = data?.error || 'Reset failed. The link may have expired.';
                }
                renderAuth();
            } catch (e) {
                state.authError = 'Network error. Please try again.';
                state.authLoading = false;
                renderAuth();
            }
        };

        // ============================================
        // RENDER
        // ============================================

        function render() {
            const user = getUser();

            // Check for password reset URL params
            const urlParams = new URLSearchParams(window.location.search);
            const resetToken = urlParams.get('reset-token');
            const resetUser = urlParams.get('reset-user');
            const resetRole = urlParams.get('reset-role');

            if (resetToken && resetUser && resetRole) {
                state.authScreen = 'reset';
            }

            if (!user || user.role !== 'client') {
                renderAuth();
                return;
            }

            const profile = state.profile;
            const calls = state.calls;
            const speedDial = state.speedDial;
            const missed = state.missedCalls;
            const activeRooms = state.activeRooms;

            document.getElementById('app').innerHTML = `
                <div class="profile-header">
                    <div class="profile-header-left">
                        <img src="images/malka-logo-white.png" alt="MalkaVRI" class="profile-header-logo">
                        <span class="profile-header-title">Client Profile</span>
                    </div>
                    <div class="profile-header-right">
                        <span class="profile-user-name">${user.name || user.email || ''}</span>
                        <button class="sign-out-btn" data-action="sign-out">Sign Out</button>
                    </div>
                </div>

                <div class="ws-status ${state.wsConnected ? 'ws-connected' : 'ws-disconnected'}" id="ws-status">
                    ${state.wsConnected ? 'Connected' : 'Reconnecting...'}
                </div>

                <div class="profile-main">
                    <!-- Left column -->
                    <div>
                        <!-- VRS Number -->
                        <div class="card" style="margin-bottom:24px">
                            <div class="card-title">Your VRS Number</div>
                            <div class="vrs-number">${profile?.primaryPhone || 'Not assigned'}</div>
                            <div class="vrs-number-label">Personal Video Relay Number</div>
                            <button class="start-call-btn" data-action="start-call" style="margin-top:16px">
                                Start Instant Room
                            </button>
                        </div>

                        <!-- Phone Dialer — enters hearing person's number, routes through interpreter queue -->
                        <div class="card" style="margin-bottom:24px">
                            <div class="card-title">Call via Interpreter</div>
                            <div class="dialer-row">
                                <input type="tel" id="dial-phone" class="dialer-input" placeholder="+1-555-XXXX"
                                    data-enter-action="dial-via-interpreter">
                                <button class="dialer-btn" data-action="dial-via-interpreter">Call</button>
                            </div>
                            <div style="font-size:12px;opacity:0.4">Enter a phone number — an interpreter will connect you</div>
                        </div>

                        <!-- TTS Fallback / VCO Mode — no interpreter needed -->
                        <div class="card" style="margin-bottom:24px;border-color:rgba(52,152,219,0.3)">
                            <div class="card-title" style="color:#3498db">TTS Fallback (VCO)</div>
                            <div style="font-size:13px;opacity:0.6;margin-bottom:12px">
                                Type messages that are read aloud to the hearing party — no interpreter needed.
                                For deaf users who prefer typing, or when no interpreter is available.
                            </div>
                            <button class="start-call-btn" data-action="open-tts" style="background:rgba(52,152,219,0.5);border-color:rgba(52,152,219,0.7)">
                                Open TTS Panel
                            </button>
                        </div>

                        <!-- Active Rooms -->
                        ${activeRooms.length > 0 ? `
                            <div class="card" style="margin-bottom:24px;border-color:rgba(76,175,80,0.3)">
                                <div class="card-title">Active Rooms</div>
                                ${activeRooms.map(room => `
                                    <div class="active-room-item">
                                        <div>
                                            <div class="active-room-info">${room.caller_name === user.name ? room.callee_name : room.caller_name}</div>
                                            <div class="active-room-time">Since ${formatDate(room.started_at)}</div>
                                        </div>
                                        <button class="join-room-btn" data-action="join-room" data-room="${escapeAttr(room.room_name)}">Join</button>
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}

                        <!-- Missed Calls -->
                        ${missed.length > 0 ? `
                            <div class="card card-missed-calls" style="margin-bottom:24px">
                                <div class="card-title" style="color:#f44336">Missed Calls (${missed.length})</div>
                                ${missed.map(mc => `
                                    <div class="missed-call-item">
                                        <div>
                                            <div class="missed-call-name">${mc.caller_name || 'Unknown'}</div>
                                            <div class="missed-call-time">${formatDate(mc.created_at)}</div>
                                        </div>
                                        <button class="call-back-btn" data-action="call-back" data-phone="${escapeAttr(mc.caller_phone || '')}">Call Back</button>
                                    </div>
                                `).join('')}
                                <button style="margin-top:12px;padding:6px 12px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:#fff;cursor:pointer;font-size:12px" data-action="mark-missed-seen">Mark All Seen</button>
                            </div>
                        ` : ''}

                        <!-- Speed Dial -->
                        <div class="card">
                            <div class="card-title">Speed Dial</div>

                            ${state.showAddForm || state.editEntry ? `
                                <div class="inline-form">
                                    <input type="text" placeholder="Contact name" value="${escapeAttr(state.editEntry ? state.editEntry.name : state.newName)}" data-change-field="name">
                                    <input type="tel" placeholder="Phone number" value="${escapeAttr(state.editEntry ? state.editEntry.phone_number : state.newPhone)}" data-change-field="phone">
                                    <div class="inline-form-actions">
                                        <button class="btn-save" data-action="save-speed-dial">
                                            ${state.editEntry ? 'Update' : 'Save'}
                                        </button>
                                        <button class="btn-cancel" data-action="cancel-form">Cancel</button>
                                    </div>
                                </div>
                            ` : ''}

                            ${speedDial.length > 0 ? `
                                <div class="speed-dial-grid">
                                    ${speedDial.map(entry => `
                                        <div class="speed-dial-card" data-action="call-contact" data-phone="${escapeAttr(entry.phone_number)}">
                                            <div class="speed-dial-actions">
                                                <button data-action="edit-entry" data-id="${escapeAttr(entry.id)}">Edit</button>
                                                <button data-action="delete-entry" data-id="${escapeAttr(entry.id)}">Del</button>
                                            </div>
                                            <div class="speed-dial-name">${entry.name}</div>
                                            <div class="speed-dial-number">${entry.phone_number}</div>
                                        </div>
                                    `).join('')}
                                </div>
                            ` : `
                                <div class="empty-state">No speed dial contacts yet</div>
                            `}

                            ${!state.showAddForm && !state.editEntry ? `
                                <button class="add-speed-dial-btn" data-action="show-add-form">+ Add Contact</button>
                            ` : ''}
                        </div>
                    </div>

                    <!-- Right column: Call History -->
                    <div>
                        <div class="card">
                            <div class="card-title">Call History</div>
                            ${calls.length > 0 ? calls.map(call => `
                                <div class="call-item">
                                    <div>
                                        <div class="call-date">${formatDate(call.started_at)}</div>
                                        <div class="call-interpreter">
                                            ${call.interpreter_name ? 'Interpreter: ' + call.interpreter_name : ''}
                                            ${call.callee_name ? 'Called: ' + call.callee_name : ''}
                                        </div>
                                    </div>
                                    <div class="call-duration">${call.duration_minutes ? call.duration_minutes + ' min' : 'In progress'}</div>
                                </div>
                            `).join('') : '<div class="empty-state">No calls yet. Start your first call!</div>'}
                        </div>
                    </div>
                </div>
            `;
        }

        // ============================================
        // EXISTING ACTIONS
        // ============================================

        window.__signOut = function() {
            clearPersistentAuth();
            if (ws) ws.close();
            window.location.href = '/';
        };

        window.__startCall = function() {
            const roomName = 'vrs-' + Math.random().toString(36).substr(2, 9);
            setPersistentItem('vrs_user_role', 'client');
            setPersistentItem('vrs_client_auth', 'true');
            window.location.href = '/' + roomName + '?role=client';
        };

        window.__callContact = function(phoneNumber) {
            // Route P2P calls through WebSocket
            wsSend({
                type: 'p2p_call',
                data: { phoneNumber: phoneNumber }
            });
        };

        window.__showAddForm = function() {
            state.showAddForm = true;
            state.editEntry = null;
            state.newName = '';
            state.newPhone = '';
            render();
        };

        window.__cancelForm = function() {
            state.showAddForm = false;
            state.editEntry = null;
            render();
        };

        window.__formField = function(field, value) {
            if (field === 'name') state.newName = value;
            if (field === 'phone') state.newPhone = value;
        };

        window.__saveSpeedDial = async function() {
            const entry = state.editEntry;
            const name = entry ? (state.newName || entry.name) : state.newName;
            const phone = entry ? (state.newPhone || entry.phone_number) : state.newPhone;

            if (!name || !phone) return;

            if (entry) {
                await apiFetch('/api/client/speed-dial/' + entry.id, {
                    method: 'PUT',
                    body: JSON.stringify({ name, phoneNumber: phone })
                });
            } else {
                await apiFetch('/api/client/speed-dial', {
                    method: 'POST',
                    body: JSON.stringify({ name, phoneNumber: phone, category: 'personal' })
                });
            }

            state.showAddForm = false;
            state.editEntry = null;
            await loadSpeedDial();
            render();
        };

        window.__editEntry = function(id) {
            const entry = state.speedDial.find(e => e.id === id);
            if (entry) {
                state.editEntry = entry;
                state.showAddForm = false;
                state.newName = entry.name;
                state.newPhone = entry.phone_number;
                render();
            }
        };

        window.__deleteEntry = async function(id) {
            await apiFetch('/api/client/speed-dial/' + id, { method: 'DELETE' });
            await loadSpeedDial();
            render();
        };

        function runAction(action, element) {
            switch (action) {
                case 'set-auth-tab':
                    window.__setAuthTab(element.dataset.tab);
                    break;
                case 'set-auth-screen':
                    window.__setAuthScreen(element.dataset.screen);
                    break;
                case 'login-email':
                    window.__loginEmail();
                    break;
                case 'login-phone':
                    window.__loginPhone();
                    break;
                case 'request-otp':
                    window.__requestOtp();
                    break;
                case 'register':
                    window.__register();
                    break;
                case 'forgot-password':
                    window.__forgotPassword();
                    break;
                case 'reset-password':
                    window.__resetPassword();
                    break;
                case 'verify-otp':
                    window.__verifyOtp();
                    break;
                case 'sign-out':
                    window.__signOut();
                    break;
                case 'start-call':
                    window.__startCall();
                    break;
                case 'dial-via-interpreter':
                    window.__dialViaInterpreter();
                    break;
                case 'open-tts':
                    window.location.href = 'tts-panel.html';
                    break;
                case 'join-room':
                    window.__joinRoom(element.dataset.room);
                    break;
                case 'call-back':
                    window.__callBack(element.dataset.phone);
                    break;
                case 'mark-missed-seen':
                    window.__markMissedSeen();
                    break;
                case 'call-contact':
                    window.__callContact(element.dataset.phone);
                    break;
                case 'show-add-form':
                    window.__showAddForm();
                    break;
                case 'save-speed-dial':
                    window.__saveSpeedDial();
                    break;
                case 'cancel-form':
                    window.__cancelForm();
                    break;
                case 'edit-entry':
                    window.__editEntry(element.dataset.id);
                    break;
                case 'delete-entry':
                    window.__deleteEntry(element.dataset.id);
                    break;
                case 'p2p-accept':
                    window.__p2pAccept();
                    break;
                case 'p2p-decline':
                    window.__p2pDecline();
                    break;
                case 'p2p-cancel':
                    window.__p2pCancel();
                    break;
                case 'cancel-queue-request':
                    window.__cancelQueueRequest();
                    break;
            }
        }

        document.addEventListener('click', function(event) {
            const target = event.target.closest('[data-action]');
            if (!target) return;

            event.preventDefault();
            runAction(target.dataset.action, target);
        });

        document.addEventListener('keydown', function(event) {
            if (event.key !== 'Enter') return;
            const target = event.target.closest('[data-enter-action]');
            if (!target) return;

            event.preventDefault();
            runAction(target.dataset.enterAction, target);
        });

        document.addEventListener('change', function(event) {
            const target = event.target.closest('[data-change-field]');
            if (!target) return;

            window.__formField(target.dataset.changeField, target.value);
        });

        // ============================================
        // DATA LOADING
        // ============================================

        async function loadProfile() {
            const data = await apiFetch('/api/client/profile');
            if (data) state.profile = data;
        }

        async function loadCallHistory() {
            const data = await apiFetch('/api/client/call-history?limit=20');
            if (data && data.calls) state.calls = data.calls;
        }

        async function loadSpeedDial() {
            const data = await apiFetch('/api/client/speed-dial');
            if (data && data.entries) state.speedDial = data.entries;
        }

        async function loadMissedCalls() {
            const data = await apiFetch('/api/client/missed-calls');
            if (data) state.missedCalls = data.missedCalls || data.missed || [];
        }

        async function loadActiveRooms() {
            const data = await apiFetch('/api/client/active-rooms');
            if (data && data.rooms) state.activeRooms = data.rooms;
        }

        // ============================================
        // INIT
        // ============================================

        async function init() {
            const user = getUser();
            const token = getToken();

            // Check for password reset URL params first
            const urlParams = new URLSearchParams(window.location.search);
            const resetToken = urlParams.get('reset-token');
            if (resetToken) {
                state.authScreen = 'reset';
                renderAuth();
                return;
            }

            if (!user || !token || user.role !== 'client') {
                renderAuth();
                return;
            }

            render();
            await Promise.all([loadProfile(), loadCallHistory(), loadSpeedDial(), loadMissedCalls(), loadActiveRooms()]);
            render();

            // Connect WebSocket for real-time P2P calling
            connectWebSocket();
            requestNotificationPermission();
        }

        init();
    })();
    </script>
</body>
</html>
