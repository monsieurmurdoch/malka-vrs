version: "3.8"

# ============================================================
# MalkaVRS Full Stack — Self-Hosted
#
# Usage:
#   cp .env.example .env   # then fill in secrets
#   docker compose up --build
#
# Services:
#   prosody   — XMPP server (Jitsi signalling)
#   jicofo    — Jitsi Conference Focus
#   jvb       — Jitsi Videobridge (WebRTC media relay)
#   postgres  — PostgreSQL application database
#   vrs       — MalkaVRS main server (API + WebSocket + frontend)
#   twilio    — Twilio Voice server (optional, phone features)
#   ops       — Ops/Admin server (dashboard, accounts)
#
# Monitoring (enabled with: docker compose --profile monitoring up):
#   prometheus       — metrics collection and storage
#   grafana          — dashboards and visualization
#   alertmanager     — alert routing and notification
#   node-exporter    — host-level metrics
#   postgres-exporter— PostgreSQL metrics
#   redis-exporter   — Redis metrics
# ============================================================

x-jitsi-common: &jitsi-common
  networks:
    - meet.jitsi

services:
  # ─── Jitsi XMPP Server ────────────────────────────────────
  prosody:
    image: jitsi/prosody:stable-9584
    <<: *jitsi-common
    ports:
      - "5222:5222"    # XMPP client
      - "5280:5280"    # BOSH / WebSocket
      - "5347:5347"    # XMPP component
    environment:
      - AUTH_TYPE=internal
      - ENABLE_AUTH=0
      - ENABLE_GUESTS=1
      - ENABLE_LOBBY=0
      - XMPP_MUC_MODULES=muc_allowners
      - PUBLIC_URL=http://localhost:8080
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_GUEST_DOMAIN=guest.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET:-jicofo-secret}
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD:-jicofo-pass}
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD:-jvb-pass}
    volumes:
      - prosody-data:/config/data

  # ─── Jitsi Conference Focus ───────────────────────────────
  jicofo:
    image: jitsi/jicofo:stable-9584
    <<: *jitsi-common
    depends_on:
      - prosody
    environment:
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET:-jicofo-secret}
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD:-jicofo-pass}

  # ─── Jitsi Videobridge ────────────────────────────────────
  jvb:
    image: jitsi/jvb:stable-9584
    <<: *jitsi-common
    depends_on:
      - prosody
    ports:
      - "10000:10000/udp"   # WebRTC media
      - "4443:4443"         # HARVEST fallback
    environment:
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD:-jvb-pass}
      - JVB_BREWERY_MUC=jvbbrewery
      - DOCKER_HOST_ADDRESS=127.0.0.1

  # ─── MalkaVRS Main Server ─────────────────────────────────
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    networks:
      - meet.jitsi
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${PGUSER:-malka}
      - POSTGRES_PASSWORD=${PGPASSWORD:-malka}
      - POSTGRES_DB=${PGDATABASE:-malka_vrs}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - pg-wal-archive:/var/lib/postgresql/wal_archive
      - ./deploy/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./deploy/postgres/005-create-wal-archive.sh:/docker-entrypoint-initdb.d/005-create-wal-archive.sh:ro
      - ./deploy/postgres/init-pgaudit.sql:/docker-entrypoint-initdb.d/010-init-pgaudit.sql:ro
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-malka} -d ${PGDATABASE:-malka_vrs}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgbouncer:
    build:
      context: .
      dockerfile: Dockerfile.pgbouncer
    ports:
      - "6432:6432"
    environment:
      - PGDATABASE=${PGDATABASE:-malka_vrs}
      - PGUSER=${PGUSER:-malka}
      - PGPASSWORD=${PGPASSWORD:-malka}
      - PGBOUNCER_POSTGRES_HOST=postgres
      - PGBOUNCER_POSTGRES_PORT=5432
      - PGBOUNCER_POOL_MODE=${PGBOUNCER_POOL_MODE:-transaction}
      - PGBOUNCER_MAX_CLIENT_CONN=${PGBOUNCER_MAX_CLIENT_CONN:-200}
      - PGBOUNCER_DEFAULT_POOL_SIZE=${PGBOUNCER_DEFAULT_POOL_SIZE:-25}
      - PGBOUNCER_RESERVE_POOL_SIZE=${PGBOUNCER_RESERVE_POOL_SIZE:-5}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=${PGPASSWORD:-malka} pg_isready -h 127.0.0.1 -p 6432 -U ${PGUSER:-malka} -d ${PGDATABASE:-malka_vrs}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - meet.jitsi

  vrs:
    build:
      context: .
      dockerfile: Dockerfile.vrs-server
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - PORT=3001
      - JITSI_DOMAIN=meet.jitsi
      - DATABASE_URL=postgresql://${PGUSER:-malka}:${PGPASSWORD:-malka}@pgbouncer:6432/${PGDATABASE:-malka_vrs}
      - MIGRATION_DATABASE_URL=postgresql://${PGUSER:-malka}:${PGPASSWORD:-malka}@postgres:5432/${PGDATABASE:-malka_vrs}
      - JVB_STATS_URL=http://jvb:8080
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      - OTEL_SERVICE_NAME=vrs-server
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_BUCKET=voicemail
      - JIBRI_CALLBACK_SECRET=${JIBRI_CALLBACK_SECRET:-jibri-callback-secret}
    depends_on:
      pgbouncer:
        condition: service_healthy
      prosody:
        condition: service_started
    networks:
      - meet.jitsi

  # ─── Twilio Voice Server ──────────────────────────────────
  twilio:
    build:
      context: .
      dockerfile: Dockerfile.twilio-server
    ports:
      - "3002:3002"
    env_file: .env
    environment:
      - TWILIO_PORT=3002
    profiles:
      - twilio          # Only started with: docker compose --profile twilio up
    networks:
      - meet.jitsi

  # ─── Ops / Admin Server ───────────────────────────────────
  ops:
    build:
      context: .
      dockerfile: Dockerfile.ops-server
    ports:
      - "3003:3003"
    env_file: .env
    environment:
      - PORT=3003
      - OPS_DATABASE_URL=postgresql://${PGUSER:-malka}:${PGPASSWORD:-malka}@pgbouncer:6432/${PGDATABASE:-malka_vrs}
      - OPS_MIGRATION_DATABASE_URL=postgresql://${PGUSER:-malka}:${PGPASSWORD:-malka}@postgres:5432/${PGDATABASE:-malka_vrs}
    depends_on:
      pgbouncer:
        condition: service_healthy
    networks:
      - meet.jitsi

  # ─── MinIO Object Storage ─────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    <<: *jitsi-common
    ports:
      - "9000:9000"     # S3 API
      - "9001:9001"     # Console
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Jibri (Jitsi Recording) ────────────────────────────────
  jibri:
    image: jitsi/jibri:stable-9584
    <<: *jitsi-common
    depends_on:
      - prosody
    environment:
      - XMPP_AUTH_USER=jibri
      - XMPP_AUTH_PASSWORD=${JIBRI_AUTH_PASSWORD:-jibri-pass}
      - JIBRI_RECORDER_USER=recorder
      - JIBRI_RECORDER_PASSWORD=${JIBRI_RECORDER_PASSWORD:-recorder-pass}
      - JIBRI_RECORDING_DIR=/config/recordings
      - JIBRI_FINALIZE_RECORDING_SCRIPT_PATH=/config/finalize.sh
      - ENABLE_RECORDING=1
      - PUBLIC_URL=http://localhost:8080
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET:-jicofo-secret}
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD:-jicofo-pass}
    volumes:
      - jibri-recordings:/config/recordings
      - ./vrs-server/scripts/jibri-finalize.sh:/config/finalize.sh:ro

  # ─── Monitoring Stack ─────────────────────────────────────────
  # Enable with: docker compose --profile monitoring up
  # ================================================================

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles:
      - monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - meet.jitsi

  grafana:
    image: grafana/grafana:11.2.0
    profiles:
      - monitoring
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/vrs-overview.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - meet.jitsi

  alertmanager:
    image: prom/alertmanager:v0.27.0
    profiles:
      - monitoring
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager:/etc/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    depends_on:
      - prometheus
    networks:
      - meet.jitsi

  node-exporter:
    image: prom/node-exporter:v1.8.2
    profiles:
      - monitoring
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    networks:
      - meet.jitsi

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    profiles:
      - monitoring
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME=${POSTGRES_EXPORTER_DSN:-postgresql://${PGUSER:-malka}:${PGPASSWORD:-malka}@postgres:5432/${PGDATABASE:-malka_vrs}?sslmode=disable}
    networks:
      - meet.jitsi

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    profiles:
      - monitoring
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=${REDIS_ADDR:-redis://redis:6379}
    networks:
      - meet.jitsi

  # ─── Billing PostgreSQL ──────────────────────────────────
  billing-postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: vrs_billing
      POSTGRES_USER: vrs_billing
      POSTGRES_PASSWORD: ${BILLING_PG_PASSWORD:-vrs_billing_dev}
    volumes:
      - billing-pg-data:/var/lib/postgresql/data
    networks:
      - meet.jitsi

networks:
  meet.jitsi:
    driver: bridge

volumes:
  prosody-data:
  pg-data:
  pg-wal-archive:
  minio-data:
  jibri-recordings:
  prometheus-data:
  grafana-data:
  billing-pg-data:
