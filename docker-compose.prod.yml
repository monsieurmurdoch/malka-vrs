version: "3.8"

x-common: &common
  restart: unless-stopped
  networks:
    - meet.jitsi

services:
  nginx:
    image: nginx:1.25-alpine
    <<: *common
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - vrs
      - vrs-maple
      - ops
      - prosody

  prosody:
    image: jitsi/prosody:stable-9584
    <<: *common
    environment:
      - AUTH_TYPE=internal
      - ENABLE_AUTH=0
      - ENABLE_GUESTS=1
      - ENABLE_LOBBY=0
      - PUBLIC_URL=https://${DOMAIN:-localhost}
      # Give all room participants owner/moderator rights so either party
      # (interpreter or Deaf client) can end the call for everyone.
      - XMPP_MUC_MODULES=muc_allowners
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_GUEST_DOMAIN=guest.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET:-jicofo-secret}
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD:-jicofo-pass}
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD:-jvb-pass}
    volumes:
      - prosody-data:/config/data

  jicofo:
    image: jitsi/jicofo:stable-9584
    <<: *common
    depends_on:
      - prosody
    environment:
      - XMPP_SERVER=prosody
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET:-jicofo-secret}
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD:-jicofo-pass}

  jvb:
    image: jitsi/jvb:stable-9584
    <<: *common
    depends_on:
      - prosody
    ports:
      - "10000:10000/udp"
      - "4443:4443"
    environment:
      - XMPP_SERVER=prosody
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD:-jvb-pass}
      - JVB_BREWERY_MUC=jvbbrewery
      - DOCKER_HOST_ADDRESS=${DROPLET_PUBLIC_IP:-127.0.0.1}
      - JVB_STUN_SERVERS=stun.l.google.com:19302,stun1.l.google.com:19302

  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    <<: *common
    environment:
      - POSTGRES_USER=${PGUSER:-malka}
      - POSTGRES_PASSWORD=${PGPASSWORD:-malka}
      - POSTGRES_DB=${PGDATABASE:-malka_vrs}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - pg-wal-archive:/var/lib/postgresql/wal_archive
      - ./deploy/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./deploy/postgres/005-create-wal-archive.sh:/docker-entrypoint-initdb.d/005-create-wal-archive.sh:ro
      - ./deploy/postgres/init-pgaudit.sql:/docker-entrypoint-initdb.d/010-init-pgaudit.sql:ro
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-malka}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgbouncer:
    build:
      context: .
      dockerfile: Dockerfile.pgbouncer
    <<: *common
    environment:
      - PGDATABASE=${PGDATABASE:-malka_vrs}
      - PGUSER=${PGUSER:-malka}
      - PGPASSWORD=${PGPASSWORD:-malka}
      - PGBOUNCER_POSTGRES_HOST=postgres
      - PGBOUNCER_POSTGRES_PORT=5432
      - PGBOUNCER_POOL_MODE=${PGBOUNCER_POOL_MODE:-transaction}
      - PGBOUNCER_MAX_CLIENT_CONN=${PGBOUNCER_MAX_CLIENT_CONN:-200}
      - PGBOUNCER_DEFAULT_POOL_SIZE=${PGBOUNCER_DEFAULT_POOL_SIZE:-25}
      - PGBOUNCER_RESERVE_POOL_SIZE=${PGBOUNCER_RESERVE_POOL_SIZE:-5}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=${PGPASSWORD:-malka} pg_isready -h 127.0.0.1 -p 6432 -U ${PGUSER:-malka} -d ${PGDATABASE:-malka_vrs}"]
      interval: 5s
      timeout: 5s
      retries: 5

  vrs:
    build:
      context: .
      dockerfile: Dockerfile.vrs-server
      args:
        TENANT: malka
    <<: *common
    env_file: .env
    environment:
      - PORT=3001
      - NODE_ENV=production
      - JITSI_DOMAIN=meet.jitsi
      - DATABASE_URL=postgresql://${PGUSER:-malka}:${PGPASSWORD:-malka}@pgbouncer:6432/${PGDATABASE:-malka_vrs}
      - MIGRATION_DATABASE_URL=postgresql://${PGUSER:-malka}:${PGPASSWORD:-malka}@postgres:5432/${PGDATABASE:-malka_vrs}
    depends_on:
      pgbouncer:
        condition: service_healthy
      prosody:
        condition: service_started

  vrs-maple:
    build:
      context: .
      dockerfile: Dockerfile.vrs-server
      args:
        TENANT: maple
    <<: *common
    env_file: .env
    environment:
      - PORT=3001
      - NODE_ENV=production
      - JITSI_DOMAIN=meet.jitsi
      - DATABASE_URL=postgresql://${PGUSER:-malka}:${PGPASSWORD:-malka}@pgbouncer:6432/${PGDATABASE:-malka_vrs}
      - MIGRATION_DATABASE_URL=postgresql://${PGUSER:-malka}:${PGPASSWORD:-malka}@postgres:5432/${PGDATABASE:-malka_vrs}
    depends_on:
      pgbouncer:
        condition: service_healthy
      prosody:
        condition: service_started

  ops:
    build:
      context: .
      dockerfile: Dockerfile.ops-server
    <<: *common
    env_file: .env
    environment:
      - PORT=3003
      - NODE_ENV=production
      - OPS_DATABASE_URL=postgresql://${PGUSER:-malka}:${PGPASSWORD:-malka}@pgbouncer:6432/${PGDATABASE:-malka_vrs}
      - OPS_MIGRATION_DATABASE_URL=postgresql://${PGUSER:-malka}:${PGPASSWORD:-malka}@postgres:5432/${PGDATABASE:-malka_vrs}
    depends_on:
      pgbouncer:
        condition: service_healthy

  twilio:
    build:
      context: .
      dockerfile: Dockerfile.twilio-server
    <<: *common
    env_file: .env
    environment:
      - TWILIO_PORT=3002
      - NODE_ENV=production
    profiles:
      - twilio

networks:
  meet.jitsi:
    driver: bridge

volumes:
  prosody-data:
  pg-data:
  pg-wal-archive:
