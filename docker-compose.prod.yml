version: "3.8"

# ============================================================
# MalkaVRS Production Stack — DigitalOcean
#
# Usage:
#   1. Copy .env.example → .env and fill in ALL values
#   2. Set DOMAIN=your-domain.com in .env
#   3. Run:  ./deploy/setup.sh          (first time — SSL certs)
#   4. Run:  docker compose -f docker-compose.prod.yml up -d --build
# ============================================================

x-common: &common
  restart: unless-stopped
  networks:
    - meet.jitsi

services:
  # ─── Nginx Reverse Proxy + SSL ────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    <<: *common
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - vrs
      - ops
      - prosody

  # ─── Certbot (SSL cert renewal) ──────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - meet.jitsi

  # ─── Jitsi XMPP Server ───────────────────────────────────
  prosody:
    image: jitsi/prosody:stable-9584
    <<: *common
    environment:
      - AUTH_TYPE=internal
      - ENABLE_AUTH=0
      - ENABLE_GUESTS=1
      - ENABLE_LOBBY=0
      - PUBLIC_URL=https://${DOMAIN:-localhost}
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_GUEST_DOMAIN=guest.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET:-jicofo-secret}
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD:-jicofo-pass}
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD:-jvb-pass}
    volumes:
      - prosody-data:/config/data

  # ─── Jitsi Conference Focus ──────────────────────────────
  jicofo:
    image: jitsi/jicofo:stable-9584
    <<: *common
    depends_on:
      - prosody
    environment:
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET:-jicofo-secret}
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD:-jicofo-pass}

  # ─── Jitsi Videobridge ───────────────────────────────────
  jvb:
    image: jitsi/jvb:stable-9584
    <<: *common
    depends_on:
      - prosody
    ports:
      - "10000:10000/udp"
      - "4443:4443"
    environment:
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD:-jvb-pass}
      - JVB_BREWERY_MUC=jvbbrewery
      - DOCKER_HOST_ADDRESS=${DROPLET_PUBLIC_IP}
      - JVB_STUN_SERVERS=stun.l.google.com:19302,stun1.l.google.com:19302

  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    <<: *common
    environment:
      - POSTGRES_USER=${PGUSER:-malka}
      - POSTGRES_PASSWORD=${PGPASSWORD:-malka}
      - POSTGRES_DB=${PGDATABASE:-malka_vrs}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-malka}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── MalkaVRS Server (API + Frontend) ────────────────────
  vrs:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    <<: *common
    env_file: .env
    environment:
      - PORT=3001
      - NODE_ENV=production
      - JITSI_DOMAIN=meet.jitsi
      - DATABASE_URL=postgresql://${PGUSER:-malka}:${PGPASSWORD:-malka}@postgres:5432/${PGDATABASE:-malka_vrs}
    depends_on:
      postgres:
        condition: service_healthy
      prosody:
        condition: service_started

  # ─── Ops / Admin Server ──────────────────────────────────
  ops:
    build:
      context: .
      dockerfile: Dockerfile.ops-server
    <<: *common
    env_file: .env
    environment:
      - PORT=3003
      - NODE_ENV=production
    volumes:
      - ops-data:/app/data

networks:
  meet.jitsi:
    driver: bridge

volumes:
  prosody-data:
  pg-data:
  ops-data:
  certbot-webroot:
  certbot-certs:
