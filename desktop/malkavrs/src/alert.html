<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Incoming MalkaVRS Request</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            align-items: center;
            animation: flash 1.1s ease-in-out infinite;
            background: #101629;
            color: #fff;
            display: flex;
            height: 100vh;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .panel {
            background: rgba(10, 14, 28, 0.9);
            border: 2px solid rgba(255, 255, 255, 0.28);
            border-radius: 18px;
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.42);
            max-width: 620px;
            padding: 34px;
            text-align: center;
            width: calc(100vw - 48px);
        }

        .eyebrow {
            color: #ffb86b;
            font-size: 15px;
            font-weight: 900;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        h1 {
            font-size: clamp(34px, 7vw, 62px);
            line-height: 0.94;
            margin: 14px 0 12px;
        }

        .summary {
            color: rgba(255, 255, 255, 0.82);
            font-size: 19px;
            line-height: 1.38;
            margin: 0 auto 24px;
            max-width: 480px;
        }

        .details {
            display: grid;
            gap: 10px;
            margin: 0 auto 26px;
            max-width: 420px;
        }

        .detail {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            padding: 11px 14px;
            text-align: left;
        }

        .label {
            color: rgba(255, 255, 255, 0.58);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .value {
            font-size: 15px;
            font-weight: 800;
            margin-left: 18px;
            text-align: right;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        button {
            border: 0;
            border-radius: 999px;
            cursor: pointer;
            font-size: 17px;
            font-weight: 900;
            min-width: 180px;
            padding: 15px 24px;
        }

        .open {
            background: #ff7a00;
            color: #fff;
        }

        .dismiss {
            background: rgba(255, 255, 255, 0.14);
            color: #fff;
        }

        @keyframes flash {
            0%, 100% {
                background: #101629;
            }

            50% {
                background: #f47d22;
            }
        }
    </style>
</head>
<body>
    <main class="panel" role="alertdialog" aria-labelledby="title" aria-describedby="summary">
        <div class="eyebrow">Incoming MalkaVRS request</div>
        <h1 id="title">Client is waiting</h1>
        <p id="summary" class="summary">Open the request to accept or decline in the interpreter profile.</p>
        <div id="details" class="details"></div>
        <div class="actions">
            <button class="open" id="open">Open Request</button>
            <button class="dismiss" id="dismiss">Silence</button>
        </div>
    </main>

    <script>
        const details = document.getElementById('details');
        const title = document.getElementById('title');
        const summary = document.getElementById('summary');

        function escapeHtml(value) {
            return String(value || '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            })[char]);
        }

        function row(label, value) {
            if (!value) return '';
            return `
                <div class="detail">
                    <div class="label">${escapeHtml(label)}</div>
                    <div class="value">${escapeHtml(value)}</div>
                </div>
            `;
        }

        window.MalkaAlert?.onIncomingCall(data => {
            const service = String(data?.callType || data?.call_type || 'VRS').toUpperCase();
            const client = data?.clientName || 'Client';
            title.textContent = `${client} is waiting`;
            summary.textContent = `Incoming ${service} request. Open the app to accept or decline.`;
            details.innerHTML = [
                row('Service', service),
                row('Language', data?.language || 'ASL'),
                row('Room', data?.roomName || data?.room_name),
                row('Hearing party', data?.targetPhone || data?.target_phone)
            ].join('');
        });

        document.getElementById('open').addEventListener('click', () => {
            window.MalkaAlert?.openMainWindow();
        });

        document.getElementById('dismiss').addEventListener('click', () => {
            window.MalkaAlert?.dismiss();
        });
    </script>
</body>
</html>
