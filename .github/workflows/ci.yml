name: Simple CI

on: [pull_request]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 18
        cache: 'npm'
    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@v41
    - name: Get changed lang files
      id: lang-files
      run: echo "all=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | grep -oE 'lang\/\S+' | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
    - run: npm install
    - name: Check git status
      run: git status
    - name: Normalize lang files to ensure sorted
      if: steps.lang-files.outputs.all
      run: npm run lang-sort
    - name: Check lang files are formatted correctly
      if: steps.lang-files.outputs.all
      run: npm run lint:lang
    - name: Check if the git repository is clean
      run: $(exit $(git status --porcelain --untracked-files=no | head -255 | wc -l)) || (echo "Dirty git tree"; git diff; exit 1)
    - run: npm run lint:ci && npm run tsc:ci
  linux-build:
    name: Build Frontend (Linux)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 18
        cache: 'npm'
    - run: npm install
    - run: make
  macos-ci:
    name: Build Frontend (macOS)
    runs-on: macOS-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 18
        cache: 'npm'
    - run: npm install
    - run: make
  android-build:
    name: Build mobile bundle (Android)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 18
        cache: 'npm'
    - run: npm install
    - run: npx react-native bundle --entry-file react/index.native.js --platform android --bundle-output /tmp/android.bundle --reset-cache
  mobile-typecheck:
    name: TypeScript (web + native)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 18
        cache: 'npm'
    - run: npm install
    - run: npm run tsc:web
    - run: npm run tsc:native
  ios-build:
    name: Build mobile bundle (iOS)
    runs-on: macOS-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 18
        cache: 'npm'
    - run: npm install
    - name: setup-cocoapods
      uses: maxim-lobanov/setup-cocoapods@v1
      with:
        podfile-path: ios/Podfile.lock
    - name: Install Pods
      run: |
        pod --version
        cd ios
        pod install --repo-update
    - name: Check if the git repository is clean
      run: $(exit $(git status --porcelain --untracked-files=no | head -255 | wc -l)) || (echo "Dirty git tree"; git diff; exit 1)
    - run: npx react-native bundle --entry-file react/index.native.js --platform ios --bundle-output /tmp/ios.bundle --reset-cache
  debian-build:
    name: Test Debian packages build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 18
        cache: 'npm'
    - run: npm install
    - run: make
    - run: sudo apt-get install -y debhelper
    - run: dpkg-buildpackage -A -rfakeroot -us -uc -d
    - run: make source-package
  vrs-server:
    name: VRS Server Tests
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: vrs-server/package-lock.json
    - run: npm install
      working-directory: vrs-server
    - run: npm run build
      working-directory: vrs-server
    - run: npm test -- --runInBand --forceExit
      working-directory: vrs-server
  ops-server:
    name: Ops Server Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: vrs-ops-server/package-lock.json
    - run: npm install
      working-directory: vrs-ops-server
    - run: npm run build
      working-directory: vrs-ops-server
  stack-config:
    name: Stack Config and Smoke Scripts
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 18
        cache: 'npm'
    - run: npm install
    - run: node --check scripts/validate-vrs-stack.mjs
    - run: node --check scripts/smoke-vrs-pages.mjs
    - run: node --check scripts/seed-vrs-admin-smoke.mjs
    - run: node --check scripts/seed-maple-vri-demo.mjs
    - run: npm run validate:vrs-stack
    - run: docker compose config --quiet
    - run: docker compose -f docker-compose.prod.yml config --quiet
