name: Deploy Droplet

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-droplet
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: make

      - name: Create deployment bundle
        # GNU tar exits with code 1 when a file changes during read (e.g. a
        # log rotate or a straggling build-step write). That's a warning, not
        # a fatal error — exit 2 is the real failure code. Suppress the
        # warning and only fail on exit >= 2 so transient writes under the
        # workspace don't kill the deploy.
        run: |
          set +e
          tar \
            --warning=no-file-changed \
            --exclude=.git \
            --exclude=.github \
            --exclude=node_modules \
            --exclude=.tmp \
            --exclude=build \
            --exclude=vrs-server/node_modules \
            --exclude=vrs-ops-server/node_modules \
            -czf deploy.tgz .
          status=$?
          if [ "$status" -gt 1 ]; then
            echo "tar failed with fatal exit code $status"
            exit "$status"
          fi
          echo "tar completed (exit $status)"

      - name: Upload bundle to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: deploy.tgz
          target: /tmp

      - name: Deploy on droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -eu
            APP_DIR="${APP_DIR:-/opt/malka-vrs}"
            NEXT_DIR="${APP_DIR}.next"

            rm -rf "$NEXT_DIR"
            mkdir -p "$NEXT_DIR"

            if [ -f "${APP_DIR}/.env" ]; then
              cp "${APP_DIR}/.env" /tmp/malka-vrs.env
            fi

            tar -xzf /tmp/deploy.tgz -C "$NEXT_DIR"

            if [ -f /tmp/malka-vrs.env ]; then
              mv /tmp/malka-vrs.env "${NEXT_DIR}/.env"
            fi

            rm -rf "$APP_DIR"
            mv "$NEXT_DIR" "$APP_DIR"

            cd "$APP_DIR"
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans
