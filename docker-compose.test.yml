version: "3.8"

# ============================================================
# MalkaVRS Test Stack — HTTP only (no SSL, no domain needed)
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d --build
#   Then visit: http://138.197.121.127
# ============================================================

x-common: &common
  restart: unless-stopped
  networks:
    - meet.jitsi

services:
  # ─── Nginx Reverse Proxy (HTTP only) ──────────────────────
  nginx:
    image: nginx:1.25-alpine
    <<: *common
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.no-ssl.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - vrs
      - ops
      - prosody

  # ─── Jitsi XMPP Server ───────────────────────────────────
  prosody:
    image: jitsi/prosody:stable-9584
    <<: *common
    environment:
      - AUTH_TYPE=internal
      - ENABLE_AUTH=0
      - ENABLE_GUESTS=1
      - ENABLE_LOBBY=0
      - PUBLIC_URL=http://${DROPLET_PUBLIC_IP:-138.197.121.127}
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_GUEST_DOMAIN=guest.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET:-jicofo-secret}
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD:-jicofo-pass}
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD:-jvb-pass}
    volumes:
      - prosody-data:/config/data

  # ─── Jitsi Conference Focus ──────────────────────────────
  jicofo:
    image: jitsi/jicofo:stable-9584
    <<: *common
    depends_on:
      - prosody
    environment:
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET:-jicofo-secret}
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD:-jicofo-pass}

  # ─── Jitsi Videobridge ───────────────────────────────────
  jvb:
    image: jitsi/jvb:stable-9584
    <<: *common
    depends_on:
      - prosody
    ports:
      - "10000:10000/udp"
      - "4443:4443"
    environment:
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD:-jvb-pass}
      - JVB_BREWERY_MUC=jvbbrewery
      - DOCKER_HOST_ADDRESS=${DROPLET_PUBLIC_IP:-138.197.121.127}
      - JVB_STUN_SERVERS=stun.l.google.com:19302,stun1.l.google.com:19302

  # ─── MalkaVRS Server (API + Frontend) ────────────────────
  vrs:
    build:
      context: .
      dockerfile: Dockerfile.vrs-prebuilt
    <<: *common
    env_file: .env
    environment:
      - PORT=3001
      - NODE_ENV=production
      - JITSI_DOMAIN=meet.jitsi
      - DROPLET_PUBLIC_IP=${DROPLET_PUBLIC_IP:-138.197.121.127}
    depends_on:
      - prosody
    volumes:
      - vrs-data:/app/vrs-server/data

  # ─── Ops / Admin Server ──────────────────────────────────
  ops:
    build:
      context: .
      dockerfile: Dockerfile.ops-server
    <<: *common
    env_file: .env
    environment:
      - PORT=3003
      - NODE_ENV=production
    volumes:
      - ops-data:/app/data

networks:
  meet.jitsi:
    driver: bridge

volumes:
  prosody-data:
  vrs-data:
  ops-data:
